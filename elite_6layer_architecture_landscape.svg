<text x="10" y="91" font-size="9.5" fill="#085041">Else L4 FTS fallback</text>
<text x="10" y="108" font-size="9.5" fill="#085041">L3 cold if needed</text>
<text x="10" y="125" font-size="9.5" fill="#085041">L5/L6 async enrich</text>
<line x1="10" y1="139" x2="142" y2="139" stroke="#9FE1CB" stroke-width="0.3"/>
<text x="10" y="158" font-size="9" font-weight="500" fill="#04342C">Key: semantic recall</text>
<text x="10" y="177" font-size="9" fill="#085041">not just keyword match</text>
</g>

<!-- Eviction Policy: 152x189 @ x=332 -->
<g transform="translate(332,38)">
<rect width="152" height="189" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.28"/>
