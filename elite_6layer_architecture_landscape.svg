<text x="10" y="57" font-size="9.5" fill="#185FA5">L2: LRU decay weekly</text>
<text x="10" y="74" font-size="9.5" fill="#185FA5">Low-heat L2 to L3 batch</text>
<text x="10" y="91" font-size="9.5" fill="#185FA5">L3: write-once archive</text>
<text x="10" y="108" font-size="9.5" fill="#185FA5">L4: manual curation only</text>
<text x="10" y="125" font-size="9.5" fill="#185FA5">L5/L6: API quota mgmt</text>
<line x1="10" y1="139" x2="142" y2="139" stroke="#B5D4F4" stroke-width="0.3"/>
<text x="10" y="158" font-size="9" font-weight="500" fill="#0C447C">Key: automatic flow</text>
<text x="10" y="177" font-size="9" fill="#185FA5">minimal manual work</text>
</g>

