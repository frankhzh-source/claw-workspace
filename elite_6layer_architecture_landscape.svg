<text x="10" y="91" font-size="9.5" fill="#993C1D">L4: Single .md file</text>
<text x="10" y="108" font-size="9.5" fill="#993C1D">L5: Cloud API fee</text>
<text x="10" y="125" font-size="9.5" fill="#993C1D">L6: OpenAI token cost</text>
