<svg viewBox="0 0 680 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>数据飞轮技术架构+商品化架构+合规标准 完整整合图</title>
  <desc>六层技术架构×三层商品化路径×抖音2026六大合规红线，含资产沉淀合规边界</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">数据飞轮技术 + 商品化 + 合规 完整架构</text>
  <line x1="40" y1="36" x2="640" y2="36" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="40" y="56" font-size="12" font-weight="500" fill="#3C3489">一、六层技术架构（客户A/B服务过程）</text>
  <rect x="40" y="64" width="600" height="42" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="55" y="76" font-size="12" font-weight="500" fill="#185FA5">感知层</text>
  <text x="110" y="76" font-size="11" fill="#0C447C">千川/抖店API 实时看板 评论区 竞品监控 商品后台</text>
  <text x="55" y="94" font-size="10" fill="#5F5E5A">采集：GMV 在线 停留 互动 评论 五维四率</text>
  <line x1="340" y1="106" x2="340" y2="114" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="40" y="116" width="600" height="42" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="55" y="128" font-size="12" font-weight="500" fill="#3C3489">反馈层 — 五维四率 + 六卖神剑诊断</text>
  <text x="55" y="146" font-size="10" fill="#26215C">品牌信任 款式匹配 渠道优势 紧迫感 互动 转粉 | 正负反馈分类</text>
  <line x1="340" y1="158" x2="340" y2="166" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="40" y="168" width="600" height="42" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="55" y="180" font-size="12" font-weight="500" fill="#085041">记忆层（Elite）</text>
  <text x="130" y="180" font-size="11" fill="#04342C">每场快照 五维评分 六卖神剑评分 主播画像 品类基线</text>
  <text x="55" y="198" font-size="10" fill="#5F5E5A">L1→L2→L3 | 90天活跃→归档 | 主播画像永久保留</text>
  <line x1="340" y1="210" x2="340" y2="218" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="40" y="222" width="290" height="42" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="185" y="234" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">SOP层 — 六卖神剑话术框架</text>
  <text x="185" y="250" text-anchor="middle" font-size="10" fill="#412402">品牌信任 款式匹配 渠道优势 紧迫感 互动 转粉</text>
  <text x="185" y="258" text-anchor="middle" font-size="9" fill="#A32D2D">⚠️ 紧迫感话术含2026新规合规红线</text>
  <rect x="350" y="222" width="290" height="42" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="495" y="234" text-anchor="middle" font-size="11" font-weight="500" fill="#A32D2D">标准层 — CORE + 抖音合规</text>
  <text x="495" y="250" text-anchor="middle" font-size="10" fill="#791F1F">5级评分 品类基准 流量标准</text>
  <text x="495" y="258" text-anchor="middle" font-size="9" fill="#A32D2D">推荐 六大红线 自查流程</text>
  <line x1="340" y1="264" x2="340" y2="272" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="40" y="276" width="600" height="30" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="55" y="294" font-size="11" font-weight="500" fill="#2C2C2A">数据库层</text>
  <text x="120" y="294" font-size="10" fill="#444441">SQLite（场次/GMV/基线）</text>
  <text x="290" y="294" font-size="10" fill="#444441">LanceDB（向量检索）</text>
  <text x="440" y="294" font-size="10" fill="#444441">文件系统（话术/课件）</text>
  <line x1="340" y1="306" x2="340" y2="314" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-g)"/>
  <rect x="40" y="318" width="600" height="30" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="332" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">正反馈循环 | 回路1：SOP迭代 回路2：品类基准更新 人工校准</text>
  <line x1="40" y1="358" x2="640" y2="358" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="40" y="380" font-size="12" font-weight="500" fill="#2C2C2A">二、资产沉淀 + 合规边界 / 三、商品化三层路径</text>
  <rect x="40" y="390" width="186" height="78" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="133" y="404" text-anchor="middle" font-size="11" font-weight="500" fill="#3B6D11">可复用 资产</text>
  <text x="133" y="420" text-anchor="middle" font-size="10" fill="#27500A">品类基准/话术模板/诊断模式</text>
  <text x="133" y="434" text-anchor="middle" font-size="10" fill="#27500A">CORE基线 六卖神剑模板</text>
  <text x="133" y="448" text-anchor="middle" font-size="9" fill="#5F5E5A">six-swords + douyin-validator</text>
  <rect x="247" y="390" width="186" height="78" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="340" y="404" text-anchor="middle" font-size="11" font-weight="500" fill="#A32D2D">不可复用 ❌</text>
  <text x="340" y="420" text-anchor="middle" font-size="10" fill="#791F1F">原始GMV/主播话术</text>
  <text x="340" y="434" text-anchor="middle" font-size="10" fill="#791F1F">商品链接/粉丝画像</text>
  <text x="340" y="448" text-anchor="middle" font-size="9" fill="#5F5E5A">合规三条款约束</text>
  <rect x="454" y="390" width="186" height="78" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="547" y="404" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">商品化三层</text>
  <text x="547" y="420" text-anchor="middle" font-size="10" fill="#412402">L1诊断 500-2000/场</text>
  <text x="547" y="434" text-anchor="middle" font-size="10" fill="#412402">L2基准 年费2-5万</text>
  <text x="547" y="448" text-anchor="middle" font-size="10" fill="#412402">L3飞轮 项目10-30万</text>
  <line x1="40" y1="480" x2="640" y2="480" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="40" y="500" font-size="12" font-weight="500" fill="#A32D2D">抖音2026合规六大红线（新增标准层）</text>
  <rect x="40" y="510" width="193" height="48" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="136" y="524" text-anchor="middle" font-size="10" font-weight="500" fill="#A32D2D">广告法极限词</text>
  <text x="136" y="540" text-anchor="middle" font-size="9" fill="#791F1F">最/第一/独家/全网最低→"成交稳定"</text>
  <rect x="243" y="510" width="193" height="48" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="339" y="524" text-anchor="middle" font-size="10" font-weight="500" fill="#A32D2D">功效夸大词</text>
  <text x="339" y="540" text-anchor="middle" font-size="9" fill="#791F1F">祛斑/减肥/抗衰老→"提亮肤色"</text>
  <rect x="447" y="510" width="193" height="48" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="543" y="524" text-anchor="middle" font-size="10" font-weight="500" fill="#A32D2D">医疗敏感词</text>
  <text x="543" y="540" text-anchor="middle" font-size="9" fill="#791F1F">治疗/根治/消炎→"日常护理"</text>
  <rect x="40" y="566" width="193" height="48" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="136" y="580" text-anchor="middle" font-size="10" font-weight="500" fill="#A32D2D">违规引流</text>
  <text x="136" y="596" text-anchor="middle" font-size="9" fill="#791F1F">微信/加V/私下交易→"点主页橱窗"</text>
  <rect x="243" y="566" width="193" height="48" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="339" y="580" text-anchor="middle" font-size="10" font-weight="500" fill="#A32D2D">绝对承诺</text>
  <text x="339" y="596" text-anchor="middle" font-size="9" fill="#791F1F">包过/终身保修→"正确使用效果更佳"</text>
  <rect x="447" y="566" width="193" height="48" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="543" y="580" text-anchor="middle" font-size="10" font-weight="500" fill="#A32D2D">限时限量新规</text>
  <text x="543" y="596" text-anchor="middle" font-size="9" fill="#791F1F">仅此x天/只亏xx单→"前50单赠品"</text>
</svg>