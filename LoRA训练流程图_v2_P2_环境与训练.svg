<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t{font-family:system-ui,-apple-system,sans-serif;font-size:14px;fill:#1f2937}
    .ts{font-family:system-ui,-apple-system,sans-serif;font-size:12px;fill:#6b7280}
    .th{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:500;fill:#1f2937}
  </style>
</defs>
<rect width="680" height="520" fill="white"/>
<text class="th" x="340" y="30" text-anchor="middle">传统 LoRA 训练完整流程</text>
<text class="ts" x="340" y="48" text-anchor="middle">Page 2 / 3 — Phase 2 环境配置 + Phase 3 训练执行</text>

<!-- Phase 2 -->
<rect x="40" y="70" width="600" height="180" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="340" y="96" text-anchor="middle" fill="#0F6E56">Phase 2  环境配置</text>

<rect x="56" y="112" width="175" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="143" y="132" text-anchor="middle" fill="#085041">硬件检查</text>
<text class="ts" x="143" y="150" text-anchor="middle" fill="#0F6E56">确认 GPU >= 16GB / 显存</text>

<rect x="247" y="112" width="175" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="334" y="132" text-anchor="middle" fill="#085041">框架选择</text>
<text class="ts" x="334" y="150" text-anchor="middle" fill="#0F6E56">Kohya_ss / AI-ToolKit / SimpleTuner</text>

<rect x="438" y="112" width="175" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="525" y="132" text-anchor="middle" fill="#085041">参数初始化</text>
<text class="ts" x="525" y="150" text-anchor="middle" fill="#0F6E56">LR 1e-4 · rank 32-64 · bf16</text>

<path d="M231 138 L247 138" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M422 138 L438 138" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="180" width="550" height="52" rx="8" fill="#5DCAA5" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="331" y="200" text-anchor="middle" fill="#085041">Precheck（不可或缺）</text>
<text class="ts" x="331" y="218" text-anchor="middle" fill="#0F6E56">路径正确 → caption加载成功 → 模型加载完成 → 1-step 不报错 → 5-step loss 可收敛</text>

<!-- Arrow Phase 2 → 3 -->
<path d="M340 256 L340 286" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 3 -->
<rect x="40" y="296" width="600" height="180" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="340" y="322" text-anchor="middle" fill="#854F0B">Phase 3  训练执行</text>

<rect x="56" y="338" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="146" y="360" text-anchor="middle" fill="#633806">多段训练</text>
<text class="ts" x="146" y="378" text-anchor="middle" fill="#854F0B">适应 → 主训 → 调优</text>

<rect x="252" y="338" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="342" y="360" text-anchor="middle" fill="#633806">Loss 监控</text>
<text class="ts" x="342" y="378" text-anchor="middle" fill="#854F0B">目标：1.0 → 0.3 → 0.15</text>

<rect x="448" y="338" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="538" y="360" text-anchor="middle" fill="#633806">中间保存</text>
<text class="ts" x="538" y="378" text-anchor="middle" fill="#854F0B">每 100-200 steps 存档</text>

<path d="M236 366 L252 366" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M432 366 L448 366" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Diagnosis -->
<rect x="56" y="408" width="550" height="52" rx="8" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="331" y="428" text-anchor="middle" fill="white">Loss 快速诊断</text>
<text class="ts" x="331" y="446" text-anchor="middle" fill="white">震荡 ↑ = LR 过高 · 不降 = 数据问题 · 飙升 ↑ = OOM / NaN</text>

<!-- Navigation hint -->
<rect x="240" y="490" width="200" height="24" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
<text class="ts" x="340" y="504" text-anchor="middle" fill="#5F5E5A">→ 进入 Phase 4-5 测试/交付</text>
</svg>
