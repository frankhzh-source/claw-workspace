<svg viewBox="0 0 680 420" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>KIWI日记公众号封面模板 v2</title>
  <desc>极简封面模板，白色底，左侧细装饰线</desc>
  <!-- 背景 -->
  <rect x="0" y="0" width="680" height="420" fill="#F8F7F4"/>
  <!-- 左侧装饰线 -->
  <rect x="40" y="60" width="2" height="300" fill="#1D9E75" rx="1"/>
  <!-- 装饰点 -->
  <circle cx="41" cy="360" r="3" fill="#1D9E75" opacity="0.3"/>
  <!-- KIWI 徽标 -->
  <rect x="68" y="60" width="90" height="26" rx="13" fill="#E1F5EE"/>
  <text x="113" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041" font-family="sans-serif">KIWI日记</text>
  <!-- 章号 — 紧凑式 -->
  <text x="68" y="170" font-size="72" font-weight="bold" fill="#1D9E75" font-family="sans-serif" letter-spacing="4">第 XXX 章</text>
  <!-- 分隔线 -->
  <line x1="68" y1="195" x2="350" y2="195" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- 标题区域 -->
  <text x="68" y="225" font-size="22" font-weight="bold" fill="#1A1A1A" font-family="sans-serif">这里是文章核心标题</text>
  <text x="68" y="250" font-size="16" fill="#5F5E5A" font-family="sans-serif">副标题或补充说明</text>
  <text x="68" y="275" font-size="12" fill="#B4B2A9" font-family="sans-serif">可延伸第二行</text>
  <!-- 分隔线 -->
  <line x1="68" y1="295" x2="250" y2="295" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- 标题区域 -->
  <text x="68" y="330" font-size="18" font-weight="bold" fill="#1A1A1A" font-family="sans-serif">这里是文章核心标题</text>
  <text x="68" y="354" font-size="14" fill="#5F5E5A" font-family="sans-serif">副标题或补充说明</text>
  <text x="68" y="372" font-size="12" fill="#B4B2A9" font-family="sans-serif">可延伸第二行</text>
  <!-- 底部 -->
  <text x="68" y="405" font-size="11" fill="#B4B2A9" font-family="sans-serif">海风 · 2026</text>
  <!-- 右下装饰元素 -->
  <line x1="520" y1="395" x2="640" y2="395" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="640" y="410" text-anchor="end" font-size="10" fill="#B4B2A9" font-family="sans-serif" opacity="0.6">来自2031年的善意</text>
</svg>