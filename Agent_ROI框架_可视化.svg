      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="750" fill="#F1EFE8" rx="12"/>

  <!-- ==================== HEADER ==================== -->
  <text x="40" y="42" font-size="18" font-weight="500" fill="#1A1A1A" font-family="sans-serif">企业AI Agent ROI 拆解框架</text>
  <text x="40" y="62" font-size="12" fill="#5F5E5A" font-family="sans-serif">成本 · 收益 · 度量 · 阶段 — 四维一体的价值度量体系</text>
  <line x1="40" y1="72" x2="640" y2="72" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- ==================== SECTION 1: TCO ICEBERG ==================== -->
  <rect x="40" y="86" width="20" height="14" rx="3" fill="#1D9E75"/>
  <text x="68" y="97" font-size="13" font-weight="500" fill="#1D9E75" font-family="sans-serif">TCO冰山模型 — 被忽略的隐藏成本</text>

  <path d="M40 166 Q120 154 200 166 Q280 178 360 166 Q440 154 520 166 Q600 178 640 166 L640 300 L40 300 Z" fill="#D3E8F5" opacity="0.5"/>
