  <text x="340" y="140" text-anchor="middle" font-size="12" font-weight="500" fill="#1D9E75" font-family="sans-serif">L1 模型调用费</text>
  <text x="340" y="155" text-anchor="middle" font-size="10" fill="#0F6E56" font-family="sans-serif">15-25% 唯一被算</text>
  <text x="410" y="140" font-size="11" fill="#5F5E5A" font-family="sans-serif">冰山一角</text>

  <rect x="240" y="172" width="200" height="28" rx="4" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
