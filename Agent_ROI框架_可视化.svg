  <text x="430" y="297" font-size="10" fill="#ffffff" font-family="sans-serif">5-10% 几乎从未被算</text>

  <rect x="120" y="304" width="340" height="18" rx="4" fill="#0C447C" stroke="#042C53" stroke-width="0.5"/>
  <text x="140" y="317" font-size="10" fill="#ffffff" font-family="sans-serif">L7 安全合规</text>
