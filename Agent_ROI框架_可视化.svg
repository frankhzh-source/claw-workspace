  <text x="40" y="348" font-size="11" fill="#5F5E5A" font-family="sans-serif">关键洞察：L3-L7五层隐藏冰山占总TCO的45-80%，只算Token单价误差可达4倍以上</text>

  <!-- ==================== SECTION 2: ROI FORMULA + 135x ==================== -->
  <line x1="40" y1="362" x2="640" y2="362" stroke="#D3D1C7" stroke-width="0.5"/>

  <rect x="40" y="376" width="20" height="14" rx="3" fill="#D85A30"/>
  <text x="68" y="387" font-size="13" font-weight="500" fill="#D85A30" font-family="sans-serif">Agent ROI公式 — 核心杠杆：产能复用率</text>

  <rect x="40" y="398" width="380" height="56" rx="8" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="60" y="420" font-size="12" fill="#5F5E5A" font-family="sans-serif">Agent ROI = (产出价值—持有成本) / 持有成本 × 100%</text>
  <text x="60" y="444" font-size="12" fill="#5F5E5A" font-family="sans-serif">产能复用率：人类=1条任务线  |  Agent≥100条任务线</text>

  <rect x="440" y="398" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="540" y="420" text-anchor="middle" font-size="24" font-weight="500" fill="#BA7517" font-family="sans-serif">135x</text>
  <text x="540" y="444" text-anchor="middle" font-size="11" fill="#854F0B" font-family="sans-serif">Agent ROI杠杆倍数</text>

  <rect x="40" y="462" width="600" height="48" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="60" y="484" font-size="11" fill="#5F5E5A" font-family="sans-serif">人类员工</text>
  <text x="60" y="502" font-size="10" fill="#888780" font-family="sans-serif">8h/天·5天/周·1条任务线·1-5%错误率</text>
  <line x1="300" y1="466" x2="300" y2="506" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="320" y="484" font-size="11" fill="#5F5E5A" font-family="sans-serif">Agent员工</text>
  <text x="320" y="502" font-size="10" fill="#888780" font-family="sans-serif">24h/7天·100-1000条·&lt;0.1%错误率</text>
  <line x1="510" y1="466" x2="510" y2="506" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="575" y="484" font-size="11" font-weight="500" fill="#1D9E75" font-family="sans-serif" text-anchor="middle">产能差异</text>
  <text x="575" y="502" font-size="10" fill="#1D9E75" font-family="sans-serif" text-anchor="middle">4.2x·100x·50x</text>

