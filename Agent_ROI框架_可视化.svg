  <text x="410" y="190" font-size="10" fill="#5F5E5A" font-family="sans-serif">10-15% 常被忽略</text>

  <rect x="220" y="202" width="240" height="28" rx="4" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="240" y="220" font-size="11" font-weight="500" fill="#0C447C" font-family="sans-serif">L3 数据准备与标注</text>
  <text x="430" y="220" font-size="10" fill="#5F5E5A" font-family="sans-serif">15-25% 严重被低估</text>

  <rect x="200" y="232" width="260" height="28" rx="4" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="220" y="250" font-size="11" font-weight="500" fill="#ffffff" font-family="sans-serif">L4 Agent开发与调优</text>
  <text x="430" y="250" font-size="10" fill="#ffffff" font-family="sans-serif">10-20% 部分被算</text>

  <rect x="180" y="262" width="280" height="20" rx="4" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
  <text x="200" y="276" font-size="11" font-weight="500" fill="#ffffff" font-family="sans-serif">L5 系统集成</text>
  <text x="430" y="276" font-size="10" fill="#ffffff" font-family="sans-serif">10-15% 常被忽略</text>

  <rect x="150" y="284" width="310" height="18" rx="4" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
