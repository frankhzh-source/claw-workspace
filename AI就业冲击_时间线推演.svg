<svg viewBox="0 0 680 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Ai employment disruption s-curve timeline 2023 to 2031</title>
  <desc>S曲线推演：AI就业冲击从量变到质变的时间线，标注当前位���（2026中）在质变前夜</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">AI就业冲击：从量变到质变的时间线推演</text>
  <text x="340" y="48" text-anchor="middle" font-size="13" fill="#5F5E5A">以中国就业数据 + AI能力演进路线为基准</text>

  <!-- Chart area: x=60 to x=640, y=70 to y=310 -->
  <!-- Y-axis -->
  <line x1="80" y1="300" x2="80" y2="80" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="80" y1="300" x2="640" y2="300" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Y-axis labels -->
  <text x="72" y="304" text-anchor="end" font-size="11" fill="#888780">低</text>
  <text x="72" y="86" text-anchor="end" font-size="11" fill="#888780">高</text>
  <text x="50" y="190" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(-90,50,190)">就业冲击强度</text>

  <!-- X-axis labels (years) -->
  <text x="120" y="316" text-anchor="middle" font-size="11" fill="#888780">2023</text>
  <text x="190" y="316" text-anchor="middle" font-size="11" fill="#888780">2024</text>
  <text x="260" y="316" text-anchor="middle" font-size="11" fill="#888780">2025</text>
  <line x1="330" y1="300" x2="330" y2="308" stroke="#E24B4A" stroke-width="2"/>
  <text x="330" y="316" text-anchor="middle" font-size="12" font-weight="500" fill="#A32D2D">2026</text>
  <text x="400" y="316" text-anchor="middle" font-size="11" fill="#888780">2027</text>
  <text x="470" y="316" text-anchor="middle" font-size="11" fill="#888780">2028</text>
  <text x="540" y="316" text-anchor="middle" font-size="11" fill="#888780">2029</text>
  <text x="610" y="316" text-anchor="middle" font-size="11" fill="#888780">2030</text>

  <!-- S-Curve (cubic bezier approximation) -->
  <!-- Phase 1: 2023-2025 缓慢上升 -->
  <path d="M120 290 Q160 280 190 270 Q230 255 260 240"
        fill="none" stroke="#378ADD" stroke-width="2.5"/>

  <!-- Phase 2: 2025-2028 加速（拐点） -->
  <path d="M260 240 Q290 220 330 185 Q370 140 400 115 Q430 100 470 95"
        fill="none" stroke="#E24B4A" stroke-width="2.5"/>

  <!-- Phase 3: 2028-2031 高位趋缓 -->
  <path d="M470 95 Q520 88 570 90 Q610 92 640 95"
        fill="none" stroke="#1D9E75" stroke-width="2.5"/>

  <!-- Phase background areas -->
  <rect x="100" y="72" width="175" height="228" fill="#E6F1FB" opacity="0.15" rx="4"/>
  <text x="108" y="88" font-size="11" font-weight="500" fill="#185FA5">量变期</text>

  <rect x="275" y="72" width="210" height="228" fill="#FCEBEB" opacity="0.15" rx="4"/>
  <text x="283" y="88" font-size="11" font-weight="500" fill="#A32D2D">临界期 · 质变</text>

  <rect x="485" y="72" width="155" height="228" fill="#E1F5EE" opacity="0.15" rx="4"/>
  <text x="493" y="88" font-size="11" font-weight="500" fill="#085041">重构期</text>

  <!-- Current position marker (2026 mid) -->
  <circle cx="330" cy="185" r="6" fill="#E24B4A"/>
  <circle cx="330" cy="185" r="10" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="338" y="170" width="158" height="30" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="344" y="185" font-size="11" font-weight="500" fill="#A32D2D">⬤ 当前位置：质变前夜</text>
  <text x="344" y="200" font-size="10" fill="#791F1F">量变已积累完成，临界点触发中</text>

  <!-- Key milestone 1: 2025 -->
  <circle cx="260" cy="240" r="3" fill="#378ADD"/>
  <line x1="260" y1="240" x2="260" y2="340" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="260" y="340" text-anchor="middle" font-size="10" fill="#5F5E5A">灵活就业达3.2亿</text>
  <text x="260" y="352" text-anchor="middle" font-size="10" fill="#5F5E5A">蓝领工资反超白领</text>

  <!-- Key milestone 2: 2027 -->
  <circle cx="400" cy="115" r="3" fill="#E24B4A"/>
  <line x1="400" y1="115" x2="400" y2="370" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#5F5E5A">AI自主调试闭环</text>
  <text x="400" y="382" text-anchor="middle" font-size="10" fill="#5F5E5A">铁人三项饱和溢出</text>

  <!-- Key milestone 3: 2028 -->
  <circle cx="470" cy="95" r="3" fill="#1D9E75"/>
  <line x1="470" y1="95" x2="470" y2="340" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="470" y="340" text-anchor="middle" font-size="10" fill="#5F5E5A">AI自主完成端侧部署</text>
  <text x="470" y="352" text-anchor="middle" font-size="10" fill="#5F5E5A">社会角色切换拐点</text>

  <!-- Bottom annotations -->
  <line x1="60" y1="420" x2="640" y2="420" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Phase summary cards -->
  <rect x="60" y="436" width="185" height="68" rx="8" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="72" y="454" font-size="12" font-weight="500" fill="#185FA5">量变期 2023-2025</text>
  <text x="72" y="470" font-size="11" fill="#0C447C">AI进入职场作工具</text>
  <text x="72" y="486" font-size="11" fill="#0C447C">灵活就业缓冲开始积累</text>
  <text x="72" y="502" font-size="11" fill="#0C447C">初级岗位逐渐冻结</text>

  <rect x="260" y="436" width="185" height="68" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="1.5"/>
  <text x="272" y="454" font-size="12" font-weight="500" fill="#A32D2D">临界期 2026-2028</text>
  <text x="272" y="470" font-size="11" fill="#791F1F">量变积累到临界质量</text>
  <text x="272" y="486" font-size="11" fill="#791F1F">AI从工具→自主执行</text>
  <text x="272" y="502" font-size="11" fill="#791F1F">缓冲垫破裂·质变发生</text>

  <rect x="460" y="436" width="185" height="68" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="472" y="454" font-size="12" font-weight="500" fill="#085041">重构期 2029-2031</text>
  <text x="472" y="470" font-size="11" fill="#04342C">社会就业形态重构</text>
  <text x="472" y="486" font-size="11" fill="#04342C">新角色（评估师）出现</text>
  <text x="472" y="502" font-size="11" fill="#04342C">新平衡初步形成</text>
</svg>