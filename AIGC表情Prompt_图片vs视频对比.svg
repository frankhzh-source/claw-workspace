<svg role="img" viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg">
  <title>AIGC表情Prompt：图片 vs 视频 对比图</title>
  <desc>左列为图片节点（LibTV/Seedream）的表达式，右列为视频节点（Seedance/Kling）的表达式，底部为6个维度的对比表格</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A" font-family="sans-serif">AIGC 表情 Prompt：图片 vs 视频 两张完全不同的写法</text>

  <!-- 左栏：图片节点 -->
  <rect x="40" y="48" width="280" height="38" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="180" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" font-family="sans-serif" dominant-baseline="central">🖼️ 图片节点（LibTV / Seedream）</text>

  <text x="50" y="106" font-size="12" fill="#5F5E5A" font-family="sans-serif">公式：三要素 + 头部 + 气场 = 凝固瞬间</text>

  <rect x="50" y="118" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="125" y="137" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5" font-family="sans-serif" dominant-baseline="central">眉（舒展/微蹙/微扬）</text>

  <rect x="50" y="162" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="125" y="181" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5" font-family="sans-serif" dominant-baseline="central">眼（柔和/专注/低垂）</text>

  <rect x="50" y="206" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="125" y="225" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5" font-family="sans-serif" dominant-baseline="central">口（微扬/闭合/微张）</text>

  <rect x="50" y="258" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="125" y="277" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5" font-family="sans-serif" dominant-baseline="central">头部倾向（侧/正/低）</text>

  <rect x="50" y="302" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="125" y="321" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5" font-family="sans-serif" dominant-baseline="central">气场状态（松弛/温暖）</text>

  <!-- 右侧列：视频节点 -->
  <rect x="360" y="48" width="280" height="38" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="500" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">🎬 视频节点（Seedance / Kling）</text>

  <text x="370" y="106" font-size="12" fill="#5F5E5A" font-family="sans-serif">公式：原因 + 表情 + 动作 + 语气 = 变化弧线</text>

  <rect x="360" y="118" width="270" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="137" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">发生原因（看到什么/经历了什么）</text>

  <rect x="360" y="162" width="270" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="181" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">表情细节（从A到B的渐变过程）</text>

  <rect x="360" y="206" width="270" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="225" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">肢体动作（有始有终的动作过程）</text>

  <rect x="360" y="258" width="270" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="277" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">说话语气（口型/呼吸/微表情）</text>

  <rect x="360" y="302" width="270" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="321" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">时间轴（起始 → 触发 → 变化 → 结果）</text>

  <!-- 中间分隔线 -->
  <line x1="335" y1="48" x2="335" y2="350" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- 底部对比区 -->
  <rect x="40" y="370" width="600" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="389" text-anchor="middle" font-size="13" font-weight="500" fill="#444441" font-family="sans-serif" dominant-baseline="central">核心差异：6个维度的对比</text>

  <!-- 对比表格 - 表头 -->
  <rect x="40" y="416" width="90" height="30" rx="4" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="85" y="431" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif" dominant-baseline="central">维度</text>
  <rect x="134" y="416" width="245" height="30" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="256" y="431" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489" font-family="sans-serif" dominant-baseline="central">🖼️ 图片节点</text>
  <rect x="383" y="416" width="257" height="30" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="511" y="431" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" font-family="sans-serif" dominant-baseline="central">🎬 视频节点</text>

  <!-- 第1行 -->
  <rect x="40" y="452" width="90" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="85" y="464" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">时间</text>
  <rect x="134" y="452" width="245" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="256" y="464" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">无时间轴，单一凝固瞬间</text>
  <rect x="383" y="452" width="257" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="511" y="464" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">有时间轴，起始→变化→结果</text>

  <!-- 第2行 -->
  <rect x="40" y="480" width="90" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="85" y="492" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">原因</text>
  <rect x="134" y="480" width="245" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="256" y="492" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">❌ 无用，静图无法表现</text>
  <rect x="383" y="480" width="257" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="511" y="492" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">✅ 必须，驱动变化弧线</text>

  <!-- 第3行 -->
  <rect x="40" y="508" width="90" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="85" y="520" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">动作</text>
  <rect x="134" y="508" width="245" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="256" y="520" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">写姿势（静态定格）</text>
  <rect x="383" y="508" width="257" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="511" y="520" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">写过程（有始有终）</text>

  <!-- 第4行 -->
  <rect x="40" y="536" width="90" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="85" y="548" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">语气</text>
  <rect x="134" y="536" width="245" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="256" y="548" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">❌ 无用，静图无声</text>
  <rect x="383" y="536" width="257" height="24" rx="3" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="511" y="548" text-anchor="middle" font-size="11" fill="#444441" font-family="sans-serif" dominant-baseline="central">✅ 可呈现，口型+呼吸</text>

  <text x="340" y="575" text-anchor="middle" font-size="11" fill="#5F5E5A" font-family="sans-serif">核心原则：给模型的信息越具体它需要猜的部分越少</text>
</svg>