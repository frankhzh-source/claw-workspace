<svg viewBox="0 0 680 720" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>数据飞轮技术架构 + 商品化架构 完整整合图</title>
  <desc>整合六层技术架构（感知→反馈→记忆→SOP→标准→数据库）与商品化三层路径，含合规边界</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">数据飞轮技术架构 + 商品化架构 完整整合图</text>
  <text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">六层技术架构 × 三层商品化路径 × 合规边界</text>
  <line x1="40" y1="56" x2="640" y2="56" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 1: Data Flywheel 6 Layers -->
  <text x="40" y="76" font-size="13" font-weight="500" fill="#3C3489">一、数据飞轮六层技术架构（客户A/B服务过程）</text>
  
  <!-- 感知层 -->
  <rect x="40" y="86" width="600" height="46" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="55" y="100" font-size="12" font-weight="500" fill="#185FA5">感知层</text>
  <text x="110" y="100" font-size="11" fill="#0C447C">千川/抖店API 实时看板 评论区 竞品监控 商品后台</text>
  <text x="55" y="120" font-size="10" fill="#5F5E5A">采集：GMV 在线人数 停留时长 互动率 评论关键词 五维四率原始数据</text>
  <line x1="340" y1="132" x2="340" y2="140" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- 反馈层 -->
  <rect x="40" y="144" width="600" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="55" y="158" font-size="12" font-weight="500" fill="#3C3489">反馈层 — 五维四率 + 六卖神剑诊断</text>
  <text x="55" y="174" font-size="11" fill="#26215C">进房率→点击率→停留率→互动率→转化率（五维漏斗评分）</text>
  <text x="380" y="174" font-size="11" fill="#26215C">六卖神剑完整度：品牌信任 款式匹配 渠道优势 紧迫感 互动 转粉</text>
  <line x1="340" y1="190" x2="340" y2="198" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- 记忆层 -->
  <rect x="40" y="202" width="600" height="46" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="55" y="216" font-size="12" font-weight="500" fill="#085041">记忆层（Elite）</text>
  <text x="130" y="216" font-size="11" fill="#04342C">每场数据快照 / 五维四率评分 / 六卖神剑评分 / 主播画像 / 品类基线</text>
  <text x="55" y="236" font-size="10" fill="#5F5E5A">L1寄存器 → L2向量库 → L3冷存储 | 90天活跃→归档 | 主播画像永久保留</text>
  <line x1="340" y1="248" x2="340" y2="256" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- SOP层 + 标准层 并行 -->
  <rect x="40" y="260" width="290" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="185" y="276" text-anchor="middle" font-size="12" font-weight="500" fill="#633806">SOP层 — 六卖神剑话术框架</text>
  <text x="185" y="290" text-anchor="middle" font-size="11" fill="#412402">品牌信任 款式匹配 渠道优势 紧迫感 互动 转粉</text>
  <text x="185" y="304" text-anchor="middle" font-size="10" fill="#5F5E5A">五感融合 + 黄金圈</text>
  
  <rect x="350" y="260" width="290" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="276" text-anchor="middle" font-size="12" font-weight="500" fill="#633806">标准层 — CORE方法论</text>
  <text x="495" y="290" text-anchor="middle" font-size="11" fill="#412402">5级评分制 品类行业基准</text>
  <text x="495" y="304" text-anchor="middle" font-size="10" fill="#5F5E5A">流量结构标准 数据异常诊断</text>
  
  <line x1="340" y1="286" x2="340" y2="312" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- 数据库层 -->
  <rect x="40" y="318" width="600" height="36" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="55" y="336" font-size="12" font-weight="500" fill="#2C2C2A">数据库层</text>
  <text x="130" y="336" font-size="11" fill="#444441">SQLite（场次/GMV/基线）</text>
  <text x="340" y="336" font-size="11" fill="#444441">LanceDB（向量检索）</text>
  <text x="530" y="336" font-size="11" fill="#444441">文件系统（话术/课件）</text>
  <line x1="340" y1="354" x2="340" y2="362" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow-g)"/>
  
  <!-- 正反馈循环 -->
  <rect x="40" y="368" width="600" height="36" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="382" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">正反馈循环（三条回路）</text>
  <text x="340" y="396" text-anchor="middle" font-size="11" fill="#04342C">回路1：单场数据→六卖神剑SOP迭代 | 回路2：多场选品→品类基准更新 | 人工校准（每场/每周/每月）</text>
  
  <line x1="40" y1="412" x2="640" y2="412" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 2: Asset Pool -->
  <text x="40" y="436" font-size="13" font-weight="500" fill="#2C2C2A">二、资产沉淀池 — 数据跨客户复用边界</text>
  
  <rect x="40" y="448" width="290" height="64" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="185" y="462" text-anchor="middle" font-size="12" font-weight="500" fill="#3B6D11">可跨客户复用 ✅</text>
  <text x="185" y="478" text-anchor="middle" font-size="11" fill="#27500A">品类转化基准 / 话术模板（六卖神剑适配版）</text>
  <text x="185" y="492" text-anchor="middle" font-size="11" fill="#27500A">异常诊断模式 / CORE基线</text>
  <text x="185" y="506" text-anchor="middle" font-size="10" fill="#5F5E5A">资产来源：six-swords.md + douyin-validator</text>
  
  <rect x="350" y="448" width="290" height="64" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="495" y="462" text-anchor="middle" font-size="12" font-weight="500" fill="#A32D2D">不可跨客户复用 ❌</text>
  <text x="495" y="478" text-anchor="middle" font-size="11" fill="#791F1F">客户原始GMV/在线/转化数据</text>
  <text x="495" y="492" text-anchor="middle" font-size="11" fill="#791F1F">主播个人话术 / 商品链接 / 粉丝画像</text>
  <text x="495" y="506" text-anchor="middle" font-size="10" fill="#5F5E5A">合规红线：合同三条款约束</text>
  
  <line x1="340" y1="512" x2="340" y2="526" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow-g)"/>
  
  <line x1="40" y1="520" x2="640" y2="520" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 3: Commercialization -->
  <text x="40" y="544" font-size="13" font-weight="500" fill="#633806">三、商品化三层路径</text>
  
  <rect x="40" y="556" width="186" height="64" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="133" y="572" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">L1 诊断报告</text>
  <text x="133" y="588" text-anchor="middle" font-size="11" fill="#412402">单场六卖神剑评分</text>
  <text x="133" y="602" text-anchor="middle" font-size="11" fill="#412402">异常定位+整改建议</text>
  <text x="133" y="614" text-anchor="middle" font-size="10" fill="#5F5E5A">500-2000元/场</text>
  
  <rect x="247" y="556" width="186" height="64" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="572" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">L2 行业基准</text>
  <text x="340" y="588" text-anchor="middle" font-size="11" fill="#412402">品类转化基准+话术模板库</text>
  <text x="340" y="602" text-anchor="middle" font-size="11" fill="#412402">CORE基线+诊断模式库</text>
  <text x="340" y="614" text-anchor="middle" font-size="10" fill="#5F5E5A">年费 2-5万</text>
  
  <rect x="454" y="556" width="186" height="64" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="547" y="572" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">L3 飞轮搭建</text>
  <text x="547" y="588" text-anchor="middle" font-size="11" fill="#412402">把客户数据跑成飞轮</text>
  <text x="547" y="602" text-anchor="middle" font-size="11" fill="#412402">Elite+LOOP+六卖神剑全套</text>
  <text x="547" y="614" text-anchor="middle" font-size="10" fill="#5F5E5A">项目 10-30万</text>
  
  <line x1="40" y1="626" x2="640" y2="626" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Bottom: Compliance & Assets -->
  <text x="40" y="648" font-size="12" font-weight="500" fill="#A32D2D">合规条款：数据所有权归客户 | 分析方法复用权归你 | 匿名化基准权可复用</text>
  <text x="40" y="662" font-size="11" fill="#5F5E5A">整合资产：六卖神剑话术体系(six-swords.md) + CORE官方数据标准(douyin-validator) + 主播90天培训路径(anchor-trainer 46点)</text>
</svg>