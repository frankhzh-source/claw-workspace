<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1660" width="100%">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t{font-family:system-ui,-apple-system,sans-serif;font-size:14px;fill:#1f2937}
    .ts{font-family:system-ui,-apple-system,sans-serif;font-size:12px;fill:#6b7280}
    .th{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:500;fill:#1f2937}
    .tsm{font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#6b7280}
  </style>
</defs>
<rect width="680" height="1660" fill="white"/>
<text class="th" x="340" y="30" text-anchor="middle">传统 LoRA 训练完整流程</text>
<text class="ts" x="340" y="48" text-anchor="middle">数据工程 环境 训练 测试 交付 — 五阶段标准工程指南</text>

<!-- Phase 1: Data Engineering (EXPANDED) -->
<rect x="40" y="70" width="600" height="460" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="340" y="96" text-anchor="middle" fill="#534AB7">Phase 1  数据工程（70% 工作量）</text>

<!-- Sub-phase A divider -->
<rect x="48" y="112" width="584" height="2" rx="1" fill="#CECBF6"/>
<text class="th" x="60" y="126" text-anchor="start" fill="#3C3489" font-size="13">阶段A: 大库采集与基线锁定</text>
<text class="tsm" x="620" y="126" text-anchor="end" fill="#7F77DD">储备库 12.6万张 → 结构化清单</text>

<!-- A1: 全量扫描 -->
<rect x="56" y="140" width="268" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="190" y="158" text-anchor="middle" fill="#3C3489">全量扫描</text>
<text class="ts" x="190" y="176" text-anchor="middle" fill="#534AB7">inventory.csv · 文件路径/格式/大小</text>

<!-- A2: 杂质清理 -->
<rect x="356" y="140" width="268" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="490" y="158" text-anchor="middle" fill="#3C3489">杂质清理</text>
<text class="ts" x="490" y="176" text-anchor="middle" fill="#534AB7">剔除非图片 · Thumbs.db/PSD/MP4</text>

<!-- A3: 命名规则审计 -->
<rect x="56" y="204" width="268" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="190" y="222" text-anchor="middle" fill="#3C3489">命名规则审计</text>
<text class="ts" x="190" y="240" text-anchor="middle" fill="#534AB7">统计命名模式 · 摸清混乱程度</text>

<!-- A4: 质量预筛选 -->
<rect x="356" y="204" width="268" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="490" y="222" text-anchor="middle" fill="#3C3489">质量预筛选</text>
<text class="ts" x="490" y="240" text-anchor="middle" fill="#534AB7">模糊/过小/零字节/重复标记</text>

<!-- Arrow from A to B -->
<path d="M340 264 L340 280" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Sub-phase B divider -->
<rect x="48" y="290" width="584" height="2" rx="1" fill="#CECBF6"/>
<text class="th" x="60" y="304" text-anchor="start" fill="#3C3489" font-size="13">阶段B: 训练集构建与验证</text>
<text class="tsm" x="620" y="304" text-anchor="end" fill="#7F77DD">视觉验证兜底 → 每品类精选</text>

<!-- B1: CLIP语义聚类 -->
<rect x="56" y="318" width="268" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="190" y="336" text-anchor="middle" fill="#3C3489">CLIP 语义聚类</text>
<text class="ts" x="190" y="354" text-anchor="middle" fill="#534AB7">Chinese-CLIP 自动分组 · 解决多创作者命名乱</text>

<!-- B2: 类目映射审核 -->
<rect x="356" y="318" width="268" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="490" y="336" text-anchor="middle" fill="#3C3489">类目映射与审核</text>
<text class="ts" x="490" y="354" text-anchor="middle" fill="#534AB7">机器分组 → 你审核映射品类标签</text>

<!-- B3: 每品类精选 -->
<rect x="56" y="382" width="268" height="52" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="190" y="400" text-anchor="middle" fill="#3C3489">每品类精选</text>
<text class="ts" x="190" y="418" text-anchor="middle" fill="#534AB7">均衡质量/视角/背景 → 30-200 张/品类</text>

<!-- B4: QC检查 -->
<rect x="356" y="382" width="268" height="52" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="490" y="400" text-anchor="middle" fill="#3C3489">QC 验收</text>
<text class="ts" x="490" y="418" text-anchor="middle" fill="#534AB7">去重 / 污染检查 / 词频分析</text>

<!-- Arrow from B to Captioning -->
<path d="M340 442 L340 466" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Captioning + Dataset split side by side -->
<rect x="56" y="468" width="268" height="44" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="190" y="490" text-anchor="middle" fill="#3C3489">标注 Captioning</text>
<text class="ts" x="190" y="504" text-anchor="middle" fill="#534AB7">FLUX 纯自然语言 40-100 词</text>

<rect x="356" y="468" width="268" height="44" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="490" y="490" text-anchor="middle" fill="#3C3489">数据集拆分</text>
<text class="ts" x="490" y="504" text-anchor="middle" fill="#534AB7">train/ (80-90%)  ↔  val/ (10-20%)</text>

<path d="M340 530 L340 560" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 2: Environment (shifted down by 230) -->
<rect x="40" y="560" width="600" height="160" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="340" y="586" text-anchor="middle" fill="#0F6E56">Phase 2  环境配置</text>

<rect x="56" y="602" width="175" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="143" y="624" text-anchor="middle" fill="#085041">硬件检查</text>
<text class="ts" x="143" y="638" text-anchor="middle" fill="#0F6E56">GPU >= 16GB</text>

<rect x="247" y="602" width="175" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="334" y="624" text-anchor="middle" fill="#085041">框架选择</text>
<text class="ts" x="334" y="638" text-anchor="middle" fill="#0F6E56">Kohya / AI-ToolKit / Codex</text>

<rect x="438" y="602" width="175" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="525" y="624" text-anchor="middle" fill="#085041">参数初始化</text>
<text class="ts" x="525" y="638" text-anchor="middle" fill="#0F6E56">LR 1e-4 / rank 32-64</text>

<path d="M231 624 L247 624" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M422 624 L438 624" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="660" width="550" height="44" rx="8" fill="#5DCAA5" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="331" y="682" text-anchor="middle" fill="#085041">Precheck（不可或缺）</text>
<text class="ts" x="331" y="696" text-anchor="middle" fill="#0F6E56">路径 → caption加载 → 模型加载 → 1-step → 5-step loss</text>

<path d="M340 720 L340 750" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 3: Training (shifted down by 230) -->
<rect x="40" y="750" width="600" height="160" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="340" y="776" text-anchor="middle" fill="#854F0B">Phase 3  训练执行</text>

<rect x="56" y="792" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="146" y="814" text-anchor="middle" fill="#633806">多段训练</text>
<text class="ts" x="146" y="830" text-anchor="middle" fill="#854F0B">适应 → 主训 → 调优</text>

<rect x="252" y="792" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="342" y="814" text-anchor="middle" fill="#633806">Loss 监控</text>
<text class="ts" x="342" y="830" text-anchor="middle" fill="#854F0B">1.0 → 0.3 → 0.15</text>

<rect x="448" y="792" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="538" y="814" text-anchor="middle" fill="#633806">中间保存</text>
<text class="ts" x="538" y="830" text-anchor="middle" fill="#854F0B">每 100-200 steps</text>

<path d="M236 820 L252 820" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M432 820 L448 820" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="862" width="550" height="36" rx="8" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text class="ts" x="331" y="884" text-anchor="middle" fill="white">震荡=LR太高 / 不降=数据问题 / 飙升=OOM</text>

<path d="M340 910 L340 940" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 4: Testing (shifted down by 230) -->
<rect x="40" y="940" width="600" height="160" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="340" y="966" text-anchor="middle" fill="#185FA5">Phase 4  测试验证（最容易被跳过）</text>

<rect x="56" y="982" width="280" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="196" y="1004" text-anchor="middle" fill="#0C447C">推理测试</text>
<text class="ts" x="196" y="1020" text-anchor="middle" fill="#185FA5">每个 CP 统一 prompt 生成 8 张</text>

<rect x="352" y="982" width="260" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="482" y="1004" text-anchor="middle" fill="#0C447C">五维评分筛选</text>
<text class="ts" x="482" y="1020" text-anchor="middle" fill="#185FA5">一致性/细节/背景/跟随/材质</text>

<path d="M336 1010 L352 1010" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="1052" width="550" height="36" rx="8" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/>
<text class="ts" x="331" y="1074" text-anchor="middle" fill="#0C447C">每个检查点 8 张图 → 五维打分 → 选总分最高的权重</text>

<path d="M340 1100 L340 1130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 5: Delivery (shifted down by 230) -->
<rect x="40" y="1130" width="600" height="120" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="340" y="1156" text-anchor="middle" fill="#3B6D11">Phase 5  交付与迭代</text>

<rect x="56" y="1172" width="175" height="56" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="143" y="1194" text-anchor="middle" fill="#27500A">权重归档</text>
<text class="ts" x="143" y="1210" text-anchor="middle" fill="#3B6D11">最佳 .safetensors</text>

<rect x="247" y="1172" width="175" height="56" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="334" y="1194" text-anchor="middle" fill="#27500A">参数可复现</text>
<text class="ts" x="334" y="1210" text-anchor="middle" fill="#3B6D11">config.yaml</text>

<rect x="438" y="1172" width="175" height="56" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="525" y="1194" text-anchor="middle" fill="#27500A">训练日志</text>
<text class="ts" x="525" y="1210" text-anchor="middle" fill="#3B6D11">loss + 踩坑记录</text>

<path d="M231 1200 L247 1200" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M422 1200 L438 1200" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Core principle -->
<rect x="40" y="1290" width="600" height="80" rx="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text class="th" x="340" y="1316" text-anchor="middle" fill="#A32D2D">核心原则：局部完成 ≠ 整体完成</text>
<text class="ts" x="340" y="1338" text-anchor="middle" fill="#A32D2D">定标准 → 逐级验收 → 通过 → 下一步  跳过任一阶段 = 返工</text>

