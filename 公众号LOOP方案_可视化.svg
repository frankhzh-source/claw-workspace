<svg viewBox="0 0 680 530" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:sans-serif;">
  <title>公众号文章LOOP方案 — 从触发到反馈的完整自动化闭环</title>
  <desc>展示公众号内容生产的循环工程方案：触发、素材、决策、生产、审核、发布、效果追踪七个步骤组成的闭环，以及对应的六大组件映射</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 主标题 -->
  <text x="340" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A1A">公众号文章LOOP方案</text>
  <text x="340" y="50" text-anchor="middle" font-size="12" fill="#5F5E5A">七步闭环 + 六大核心组件映射</text>

  <!-- 行1：触发 → 素材 → 决策 → 生产 -->
  <rect x="40" y="74" width="140" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="110" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#185FA5">触发心跳</text>
  <text x="110" y="116" text-anchor="middle" font-size="11" fill="#0C447C">定时 / 事件启动</text>

  <line x1="180" y1="102" x2="195" y2="102" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="195" y="74" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="265" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">素材收集</text>
  <text x="265" y="116" text-anchor="middle" font-size="11" fill="#534AB7">Web / Elite / 对话</text>

  <line x1="335" y1="102" x2="350" y2="102" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="74" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="420" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">选题决策</text>
  <text x="420" y="116" text-anchor="middle" font-size="11" fill="#0F6E56">匹配度 / 风格选择</text>

  <line x1="490" y1="102" x2="505" y2="102" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="505" y="74" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="575" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#854F0B">内容生产</text>
  <text x="575" y="116" text-anchor="middle" font-size="11" fill="#633806">写作 / 视觉 Agent</text>

  <!-- 下行箭头 -->
  <line x1="575" y1="130" x2="575" y2="178" stroke="#5F5E5A" stroke-width="1.5"/>
  <line x1="575" y1="178" x2="505" y2="178" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 行2：审核 → 发布 → 追踪 -->
  <rect x="505" y="178" width="140" height="56" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
  <text x="575" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#A32D2D">审核校验</text>
  <text x="575" y="220" text-anchor="middle" font-size="11" fill="#791F1F">格式 / 铁律 / 安全阀</text>

  <line x1="505" y1="206" x2="490" y2="206" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="178" width="140" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="420" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#3B6D11">发布交付</text>
  <text x="420" y="220" text-anchor="middle" font-size="11" fill="#27500A">飞书 / 公众号</text>

  <line x1="350" y1="206" x2="335" y2="206" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="195" y="178" width="140" height="56" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
  <text x="265" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#993556">效果追踪</text>
  <text x="265" y="220" text-anchor="middle" font-size="11" fill="#72243E">数据回写 / Elite记忆</text>

  <!-- 回环箭头：追踪 → 触发 -->
  <path d="M195 206 Q40 206 40 102 Q40 102 40 102" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="28" y="158" text-anchor="middle" font-size="10" fill="#1D9E75">循环反馈</text>

  <!-- 分隔线 -->
  <line x1="40" y1="258" x2="640" y2="258" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- 六大组件映射 -->
  <text x="340" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">六大核心组件 → 流程步骤映射</text>

  <!-- 第1行组件 -->
  <rect x="40" y="300" width="185" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="55" y="318" font-size="12" font-weight="bold" fill="#2C2C2A">触发心跳</text>
  <text x="140" y="318" font-size="11" fill="#5F5E5A">→ 第1步：触发</text>

  <rect x="245" y="300" width="185" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="260" y="318" font-size="12" font-weight="bold" fill="#2C2C2A">连接器</text>
  <text x="323" y="318" font-size="11" fill="#5F5E5A">→ 第2步：素材</text>

  <rect x="450" y="300" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="465" y="318" font-size="12" font-weight="bold" fill="#085041">技能知识库</text>
  <text x="551" y="318" font-size="11" fill="#085041">→ 生产/审核</text>

  <!-- 第2行组件 -->
  <rect x="40" y="358" width="185" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="55" y="376" font-size="12" font-weight="bold" fill="#2C2C2A">子代理分工</text>
  <text x="145" y="376" font-size="11" fill="#5F5E5A">→ 生产</text>

  <rect x="245" y="358" width="185" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="260" y="376" font-size="12" font-weight="bold" fill="#2C2C2A">隔离工作树</text>
  <text x="345" y="376" font-size="11" fill="#5F5E5A">→ 发布</text>

  <rect x="450" y="358" width="185" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="465" y="376" font-size="12" font-weight="bold" fill="#3C3489">持久化记忆</text>
  <text x="548" y="376" font-size="11" fill="#3C3489">→ 第7步：追踪</text>

  <!-- 底部标注 -->
  <text x="340" y="430" text-anchor="middle" font-size="11" fill="#5F5E5A">目标：从"人指挥AI写每篇文章" 升级到 "人定目标，AI自主循环生产"</text>

  <!-- 资产概览小条 -->
  <rect x="40" y="448" width="290" height="36" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="50" y="470" font-size="11" fill="#185FA5">已有：automation + Elite全栈 + 写作铁律 + SVG能力</text>

  <rect x="350" y="448" width="290" height="36" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="360" y="470" font-size="11" fill="#A32D2D">待补：选题规则框架 + 统一审核清单</text>
</svg>