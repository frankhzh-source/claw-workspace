  <rect width="800" height="1130" fill="#fff"/>

  <!-- Stage 5 -->
  <rect x="40" y="30" width="720" height="34" rx="6" fill="#993556"/>
  <text class="tb" x="55" y="53" font-size="14" fill="#fff">Stage 5  第五阶段：大师 - 实战精进</text>

  <rect x="55" y="78" width="3" height="14" rx="1.5" fill="#D4537E"/>
  <text class="tb" x="63" y="90" font-size="12" fill="#993556">第九章：实战技巧与陷阱</text>
  <text class="tb" x="55" y="110" font-size="11" fill="#993556">4大实战技巧：</text>
  <text class="t" x="55" y="126" font-size="10" fill="#555">> 模板化+人工精修 (100min->30min，省70min)</text>
  <text class="t" x="55" y="141" font-size="10" fill="#555">> 分批训练：300步->600步->750步 (及时止损)</text>
  <text class="t" x="55" y="156" font-size="10" fill="#555">> 多CP对比：CP-500/CP-750/CP-1000选最佳</text>
  <text class="t" x="55" y="171" font-size="10" fill="#555">> caption_dropout_rate=0.1 (防过拟合)</text>

  <text class="tb" x="55" y="192" font-size="11" fill="#993556">3大陷阱：</text>
  <text class="t" x="55" y="208" font-size="10" fill="#555">> 模板句式重复 | 触发词位置固定 | 词频污染累积</text>

  <rect x="55" y="228" width="3" height="14" rx="1.5" fill="#D4537E"/>
  <text class="tb" x="63" y="240" font-size="12" fill="#993556">第十章：案例学习</text>

  <text class="t" x="55" y="258" font-size="11" fill="#993556">案例1：服装 LoRA (17品3源,51图)</text>
  <text class="t" x="55" y="274" font-size="10" fill="#555">> 删3张低质->48张->45/48通过(93.75%)->修复->48/48(100%)</text>
  <text class="t" x="55" y="289" font-size="10" fill="#555">> CP-300(有效)->CP-600(特征)->CP-750(最佳)->CP-1000(过拟合)</text>
  <text class="t" x="55" y="304" font-size="10" fill="#555">> 生成测试：17/17款全正确，触发词100%有效</text>

  <text class="t" x="55" y="324" font-size="11" fill="#993556">案例2：词频污染修复 (睡衣, green 45%)</text>
  <text class="t" x="55" y="340" font-size="10" fill="#555">> 替换同义词(mint/olive/emerald/sage)->降至15%->颜色正常</text>

  <text class="t" x="55" y="360" font-size="11" fill="#993556">案例3：触发词无效排查</text>
  <text class="t" x="55" y="376" font-size="10" fill="#555">> WD14自动标注->标签列表->手动重标51张(3h)->触发词有效</text>

  <!-- 黄金参数 -->
  <rect x="40" y="398" width="720" height="28" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
  <text class="tb" x="400" y="413" text-anchor="middle" font-size="10" fill="#993556">训练黄金参数</text>
  <text class="t" x="400" y="423" text-anchor="middle" font-size="9" fill="#993556">model=FLUX.2-klein-4B | LR=1e-3 | steps=750 | batch_size=2 | caption_dropout_rate=0.1 | trigger_word=ohwx person</text>

  <!-- ===== 附录 ===== -->
  <rect x="40" y="445" width="720" height="34" rx="6" fill="#444"/>
  <text class="tb" x="55" y="468" font-size="14" fill="#fff">Appendix  附录：快速参考</text>

  <rect x="55" y="492" width="3" height="14" rx="1.5" fill="#444"/>
  <text class="tb" x="63" y="504" font-size="12" fill="#333">4个核心脚本</text>

  <rect x="55" y="514" width="220" height="18" rx="4" fill="#F1EFE8"/>
  <text class="tb" x="63" y="527" font-size="10" fill="#333">1. validation_script.py</text>
  <text class="t" x="285" y="527" font-size="10" fill="#666">质量验收：长度/触发词/污染检查</text>

  <rect x="55" y="536" width="220" height="18" rx="4" fill="#F1EFE8"/>
  <text class="tb" x="63" y="549" font-size="10" fill="#333">2. caption_generator.py</text>
  <text class="t" x="285" y="549" font-size="10" fill="#666">批量生成：15模板+CSV驱动</text>

  <rect x="55" y="558" width="220" height="18" rx="4" fill="#F1EFE8"/>
  <text class="tb" x="63" y="571" font-size="10" fill="#333">3. word_frequency_visualizer.py</text>
  <text class="t" x="285" y="571" font-size="10" fill="#666">词频分析+污染检测+可视化</text>

  <rect x="55" y="580" width="220" height="18" rx="4" fill="#F1EFE8"/>
  <text class="tb" x="63" y="593" font-size="10" fill="#333">4. troubleshooting.py</text>
  <text class="t" x="285" y="593" font-size="10" fill="#666">故障排查：5种失败诊断</text>

