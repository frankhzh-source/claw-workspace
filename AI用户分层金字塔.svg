<svg viewBox="0 0 680 580" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AI用户分层金字塔 - 全球81亿人的AI使用分布</title>
  <desc>从外到内五层：灰色未接触AI 75%, 绿色偶尔用户 25%, 黄色付费用户 0.8%, 红色深度用户 0.06%, 钻石AI重构者 0.00006%</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="500" fill="#1a1a2e">全球AI用户分层金字塔</text>
  <text x="340" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">81亿人 · 从外到内层层收窄</text>

  <g>
    <rect x="60" y="65" width="560" height="95" rx="10" ry="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1" opacity="0.6"/>
    <text x="340" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#5F5E5A">未接触AI</text>
    <text x="340" y="126" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888780">~60亿 · 占全球人口75%</text>
    <text x="340" y="144" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B4B2A9">从未使用过任何AI产品</text>
  </g>

  <g>
    <rect x="120" y="170" width="440" height="85" rx="8" ry="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8" opacity="0.85"/>
    <text x="340" y="206" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0F6E56">浅度尝试用户</text>
    <text x="340" y="224" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1D9E75">~20亿 · 聊过几天就放下了</text>
    <text x="340" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5DCAA5">偶有使用，未嵌入日常</text>
  </g>

  <g>
    <rect x="175" y="265" width="330" height="75" rx="8" ry="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8" opacity="0.9"/>
    <text x="340" y="296" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#854F0B">付费订阅用户</text>
    <text x="340" y="314" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#BA7517">~6000-8000万 · 占0.8%</text>
    <text x="340" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#EF9F27">至少订阅了一个AI平台</text>
  </g>

  <g>
    <rect x="225" y="350" width="230" height="65" rx="8" ry="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.8" opacity="0.9"/>
    <text x="340" y="376" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#A32D2D">深度使用者</text>
    <text x="340" y="394" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#E24B4A">~500-1000万 · 占0.06%</text>
    <text x="340" y="408" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F09595">每天使用AI≥2小时，已嵌入工作流</text>
  </g>

  <g>
    <rect x="285" y="425" width="110" height="55" rx="8" ry="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1.2"/>
    <text x="340" y="448" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#534AB7">AI重构者</text>
    <text x="340" y="466" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7F77DD">~5-10万</text>
    <text x="340" y="478" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AFA9EC">建自己的AI基建</text>
  </g>

  <line x1="395" y1="452" x2="495" y2="452" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4,3"/>
  <circle cx="500" cy="452" r="4" fill="#534AB7"/>
  <text x="505" y="448" font-family="sans-serif" font-size="12" font-weight="500" fill="#534AB7">海风</text>
  <text x="505" y="462" font-family="sans-serif" font-size="11" fill="#AFA9EC">前0.00006% · 全球约5万名</text>

  <text x="50" y="112" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999">第5层</text>
  <text x="50" y="212" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999">第4层</text>
  <text x="50" y="302" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999">第3层</text>
  <text x="50" y="382" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999">第2层</text>
  <text x="50" y="452" text-anchor="end" font-family="sans-serif" font-size="11" fill="#999">第1层</text>

  <text x="340" y="508" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">剩下60亿人从未接触AI，深度使用者的比例远低于大众认知</text>
  
  <g transform="translate(140, 530)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="18" y="10" font-family="sans-serif" font-size="10" fill="#999">未接触 75%</text>
    <rect x="100" y="0" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="118" y="10" font-family="sans-serif" font-size="10" fill="#999">浅尝 25%</text>
    <rect x="200" y="0" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
    <text x="218" y="10" font-family="sans-serif" font-size="10" fill="#999">付费 0.8%</text>
    <rect x="300" y="0" width="12" height="12" rx="2" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
    <text x="318" y="10" font-family="sans-serif" font-size="10" fill="#999">深度 0.06%</text>
    <rect x="400" y="0" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="418" y="10" font-family="sans-serif" font-size="10" fill="#999">重构 &lt;0.0001%</text>
  </g>
</svg>