<svg viewBox="0 0 680 530" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:sans-serif;">
  <title>AI编码范式从提示词工程到循环工程的四个阶段演进</title>
  <desc>展示提示词工程、上下文工程、驾驭工程、循环工程四个阶段的定义、特点、闭环流程和六大核心组件</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 主标题 -->
  <text x="340" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A1A">AI编码范式演进四阶段</text>
  <text x="340" y="56" text-anchor="middle" font-size="12" fill="#5F5E5A">从"人指挥AI"到"AI自主循环"</text>

  <!-- 阶段1：提示词工程 -->
  <rect x="28" y="76" width="145" height="88" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="100" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#185FA5">提示词工程</text>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="#185FA5">2024</text>
  <text x="100" y="140" text-anchor="middle" font-size="11" fill="#3C3489">人全程写提示词</text>
  <text x="100" y="156" text-anchor="middle" font-size="11" fill="#3C3489">AI单次输出</text>

  <!-- 箭头1 -->
  <line x1="173" y1="120" x2="188" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 阶段2：上下文工程 -->
  <rect x="188" y="76" width="145" height="88" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="260" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#185FA5">上下文工程</text>
  <text x="260" y="120" text-anchor="middle" font-size="11" fill="#185FA5">2025</text>
  <text x="260" y="140" text-anchor="middle" font-size="11" fill="#3C3489">知识库/上下文管控</text>
  <text x="260" y="156" text-anchor="middle" font-size="11" fill="#3C3489">解决AI失忆</text>

  <!-- 箭头2 -->
  <line x1="333" y1="120" x2="348" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 阶段3：驾驭工程 -->
  <rect x="348" y="76" width="145" height="88" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="420" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#854F0B">驾驭工程</text>
  <text x="420" y="120" text-anchor="middle" font-size="11" fill="#854F0B">2025末-2026初</text>
  <text x="420" y="140" text-anchor="middle" font-size="11" fill="#633806">独立运行沙箱环境</text>
  <text x="420" y="156" text-anchor="middle" font-size="11" fill="#633806">工具/安全阀</text>

  <!-- 箭头3 -->
  <line x1="493" y1="120" x2="508" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 阶段4：循环工程 -->
  <rect x="508" y="72" width="145" height="96" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="2"/>
  <text x="580" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#3B6D11">循环工程</text>
  <text x="580" y="118" text-anchor="middle" font-size="11" fill="#3B6D11">2026</text>
  <text x="580" y="138" text-anchor="middle" font-size="11" fill="#27500A">自主闭环运行</text>
  <text x="580" y="154" text-anchor="middle" font-size="11" fill="#27500A">无人干预</text>

  <!-- 分隔线 -->
  <line x1="40" y1="182" x2="640" y2="182" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- 闭环流程标题 -->
  <text x="340" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Loop Engineering 标准闭环流程</text>

  <!-- 连接线（中心到各节点） -->
  <line x1="265" y1="270" x2="305" y2="258" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="265" y1="298" x2="305" y2="300" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="375" y1="270" x2="345" y2="258" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="375" y1="298" x2="345" y2="300" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 中心判断圆 -->
  <circle cx="340" cy="284" r="36" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="340" y="276" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">目标</text>
  <text x="340" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">达成？</text>

  <!-- 闭环节点：执行 -->
  <rect x="170" y="252" width="95" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="217" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">执行</text>
  <text x="217" y="284" text-anchor="middle" font-size="11" fill="#534AB7">Action</text>

  <!-- 闭环节点：观察 -->
  <rect x="170" y="316" width="95" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="217" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">观察</text>
  <text x="217" y="348" text-anchor="middle" font-size="11" fill="#534AB7">Observation</text>

  <!-- 闭环节点：评估 -->
  <rect x="415" y="252" width="95" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="462" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">评估</text>
  <text x="462" y="284" text-anchor="middle" font-size="11" fill="#534AB7">Evaluate</text>

  <!-- 闭环节点：修正 -->
  <rect x="415" y="316" width="95" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="462" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">修正</text>
  <text x="462" y="348" text-anchor="middle" font-size="11" fill="#534AB7">Revision</text>

  <!-- 循环箭头：执行→目标 -->
  <path d="M217 252 Q217 236 290 248" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- 分隔线 -->
  <line x1="40" y1="388" x2="640" y2="388" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- 六大组件标题 -->
  <text x="340" y="412" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">六大核心组件</text>

  <!-- 组件1：触发心跳 -->
  <rect x="32" y="428" width="195" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="52" y="450" font-size="12" font-weight="bold" fill="#2C2C2A">触发心跳</text>
  <text x="130" y="450" font-size="11" fill="#5F5E5A">定时/事件触发</text>

  <!-- 组件2：隔离工作树 -->
  <rect x="242" y="428" width="195" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="262" y="450" font-size="12" font-weight="bold" fill="#2C2C2A">隔离工作树</text>
  <text x="351" y="450" font-size="11" fill="#5F5E5A">独立沙箱目录</text>

  <!-- 组件3：技能知识库 -->
  <rect x="452" y="428" width="195" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="472" y="450" font-size="12" font-weight="bold" fill="#2C2C2A">技能知识库</text>
  <text x="556" y="450" font-size="11" fill="#5F5E5A">固化经验/规范</text>

  <!-- 组件4：连接器 -->
  <rect x="32" y="480" width="195" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="52" y="502" font-size="12" font-weight="bold" fill="#2C2C2A">连接器</text>
  <text x="113" y="502" font-size="11" fill="#5F5E5A">对接真实系统</text>

  <!-- 组件5：子代理分工 -->
  <rect x="242" y="480" width="195" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="262" y="502" font-size="12" font-weight="bold" fill="#2C2C2A">子代理分工</text>
  <text x="338" y="502" font-size="11" fill="#5F5E5A">执行/审核分离</text>

  <!-- 组件6：持久化记忆（高亮） -->
  <rect x="452" y="480" width="195" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="472" y="502" font-size="12" font-weight="bold" fill="#085041">持久化记忆</text>
  <text x="556" y="502" font-size="11" fill="#085041">灵魂组件</text>
</svg>