<svg viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
  <title>AIGC角色一致性四维框架</title>
  <desc>主视觉肖像→三视图→表情设定→面部细节，四个维度依次推进</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 500; fill: #2C2C2A; }
    .h { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .t { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #2C2C2A; }
    .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5F5E5A; }
    .tag { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #5F5E5A; }
  </style>

  <!-- Title -->
  <text class="title" x="340" y="36" text-anchor="middle" dominant-baseline="central">AIGC 角色一致性 四维框架</text>
  <text class="ts" x="340" y="56" text-anchor="middle" dominant-baseline="central">4个维度按顺序执行，漏掉任何一步都会翻车</text>

  <!-- Arrow connector -->
  <path d="M 196 90 L 484 90" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 196 92 L 484 92" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 196 94 L 484 94" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1: 主视觉肖像 -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="142" height="38" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="h" x="71" y="19" text-anchor="middle" dominant-baseline="central" fill="#0C447C">① 主视觉肖像</text>
    <text class="ts" x="71" y="55" text-anchor="middle" dominant-baseline="central">参考图打底</text>
    <text class="t" x="71" y="75" text-anchor="middle" dominant-baseline="central">白底+平铺+模特</text>
    <text class="tag" x="71" y="93" text-anchor="middle" dominant-baseline="central">三图同传 权重0.8-0.9</text>
  </g>

  <!-- Step 2: 三视图 -->
  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="142" height="38" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="h" x="71" y="19" text-anchor="middle" dominant-baseline="central" fill="#085041">② 三视图</text>
    <text class="ts" x="71" y="55" text-anchor="middle" dominant-baseline="central">拆3个独立节点</text>
    <text class="t" x="71" y="75" text-anchor="middle" dominant-baseline="central">正/侧45/背面</text>
    <text class="tag" x="71" y="93" text-anchor="middle" dominant-baseline="central">不拼单图 视角各不同</text>
  </g>

  <!-- Step 3: 表情设定 -->
  <g transform="translate(360, 80)">
    <rect x="0" y="0" width="142" height="38" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="h" x="71" y="19" text-anchor="middle" dominant-baseline="central" fill="#633806">③ 表情设定</text>
    <text class="ts" x="71" y="55" text-anchor="middle" dominant-baseline="central">给情绪一个理由</text>
    <text class="t" x="71" y="75" text-anchor="middle" dominant-baseline="central">原因+表情+肢体</text>
    <text class="tag" x="71" y="93" text-anchor="middle" dominant-baseline="central">克制 不要表演型</text>
  </g>

  <!-- Step 4: 面部细节 -->
  <g transform="translate(520, 80)">
    <rect x="0" y="0" width="142" height="38" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="h" x="71" y="19" text-anchor="middle" dominant-baseline="central" fill="#3C3489">④ 面部细节</text>
    <text class="ts" x="71" y="55" text-anchor="middle" dominant-baseline="central">六要素固定块</text>
    <text class="t" x="71" y="75" text-anchor="middle" dominant-baseline="central">脸型/眉/眼/鼻/唇/肤</text>
    <text class="tag" x="71" y="93" text-anchor="middle" dominant-baseline="central">每镜复制粘贴同一行</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="200" x2="640" y2="200" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Detail sections -->
  <text class="h" x="340" y="226" text-anchor="middle" dominant-baseline="central">维度详解</text>

  <!-- Dimension 1 detail -->
  <g transform="translate(40, 246)">
    <rect x="0" y="0" width="288" height="104" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="h" x="14" y="22" fill="#0C447C" dominant-baseline="central">主视觉肖像</text>
    <text class="t" x="14" y="44" dominant-baseline="central">• 正面半身照 光源统一</text>
    <text class="t" x="14" y="64" dominant-baseline="central">• 白底商品图+平铺图+模特图 三张同传</text>
    <text class="t" x="14" y="84" dominant-baseline="central">• 锁印花/版型/人物姿态</text>
    <text class="ts" x="14" y="100" dominant-baseline="central">参考图权重0.8-0.9</text>
  </g>

  <!-- Dimension 2 detail -->
  <g transform="translate(352, 246)">
    <rect x="0" y="0" width="288" height="104" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="h" x="14" y="22" fill="#085041" dominant-baseline="central">三视图</text>
    <text class="t" x="14" y="44" dominant-baseline="central">• 拆3个独立图像节点</text>
    <text class="t" x="14" y="64" dominant-baseline="central">• 各节点传同一张参考图</text>
    <text class="t" x="14" y="84" dominant-baseline="central">• 色温/光位/构图三图统一</text>
    <text class="ts" x="14" y="100" dominant-baseline="central">加负面：多视图 拼贴 并排</text>
  </g>

  <!-- Dimension 3 detail -->
  <g transform="translate(40, 364)">
    <rect x="0" y="0" width="288" height="104" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="h" x="14" y="22" fill="#633806" dominant-baseline="central">表情设定</text>
    <text class="t" x="14" y="44" dominant-baseline="central">• 公式：原因+表情+肢体+语气</text>
    <text class="t" x="14" y="64" dominant-baseline="central">• 喜/静/忧/疑 4组基准模板</text>
    <text class="t" x="14" y="84" dominant-baseline="central">• 电商级：温和自然 不抢服装风头</text>
    <text class="ts" x="14" y="100" dominant-baseline="central">每镜换触发原因 避免重复</text>
  </g>

  <!-- Dimension 4 detail -->
  <g transform="translate(352, 364)">
    <rect x="0" y="0" width="288" height="104" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="h" x="14" y="22" fill="#3C3489" dominant-baseline="central">面部细节</text>
    <text class="t" x="14" y="44" dominant-baseline="central">• 六要素：脸型/眉/眼/鼻/唇/皮肤</text>
    <text class="t" x="14" y="64" dominant-baseline="central">• 每项写具体 不写抽象词</text>
    <text class="t" x="14" y="84" dominant-baseline="central">• 面部长效固定块 每镜复制粘贴</text>
    <text class="ts" x="14" y="100" dominant-baseline="central">再搭参考图兜底面部结构</text>
  </g>
</svg>