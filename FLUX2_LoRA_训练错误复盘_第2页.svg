  <text x="98" y="352" font-size="12" font-weight="600" fill="#6b7280">#9 模型格式问题与数据工程边界不清</text>
  <text x="42" y="371" font-size="11" fill="#374151">问题：AI-ToolKit precheck 失败根因是模型格式：ComfyUI/Diffusers 格式与</text>
  <text x="42" y="384" font-size="11" fill="#374151"> native safetensors 不一致。</text>
  <text x="42" y="397" font-size="11" fill="#059669">修正：分开处理：先完成数据工程 → 再处理模型权重格式 → 再做 1-step precheck，避免混合讨论。</text>
