  <text x="98" y="176" font-size="12" font-weight="600" fill="#16a34a">#7 C 盘迁移脚本二次执行逻辑不完善</text>
  <text x="42" y="195" font-size="11" fill="#374151">问题：Outputs 迁移 D 盘后，脚本对已存在备份和 junction 的状态处理不完整，导致二次运行报错。</text>
  <text x="42" y="208" font-size="11" fill="#059669">修正：修复脚本，完成 outputs 迁移，D 盘保留正式 outputs + backup，C 盘释放空间。</text>
