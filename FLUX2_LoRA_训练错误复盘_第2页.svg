  <text x="98" y="88" font-size="12" font-weight="600" fill="#16a34a">#6 授权服务 503 处理不够主动</text>
  <text x="42" y="107" font-size="11" fill="#374151">问题：多次 D 盘写入授权失败或 503，未第一时间用清晰状态同步说明，导致任务表面停滞。</text>
  <text x="42" y="120" font-size="11" fill="#059669">修正：遇到授权失败应立即给出：完成内容 / 卡点 / 可执行命令 / 预期输出 / 下一步复核（5 步 SOP）。</text>
