  <text x="42" y="283" font-size="11" fill="#374151">问题：validate_flux2_captions.py 将下划线触发词误判为连字符污染，导致 120 条</text>
  <text x="42" y="296" font-size="11" fill="#374151"> caption 全部错误显示失败。</text>
  <text x="42" y="309" font-size="11" fill="#059669">修正：已修正脚本逻辑，重新验证结果为 120 passed / 0 failed。</text>
