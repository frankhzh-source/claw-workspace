<svg viewBox="0 0 680 580" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>中国AI用户分层 - 按付费行为划分</title>
  <desc>五层：未接触68%, 尝鲜用户28%, 免费活跃3%, 基础付费1%, 付费重度0.1%</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="500" fill="var(--color-text-primary)">中国AI用户分层 · 按付费行为</text>
  <text x="340" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" fill="var(--color-text-secondary)">中国14亿人 · 付了钱才算真需求</text>

  <g>
    <rect x="60" y="65" width="560" height="95" rx="10" ry="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
    <text x="340" y="108" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#5F5E5A">从未接触AI</text>
    <text x="340" y="126" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888780">~9.5亿 · 占人口68%</text>
    <text x="340" y="144" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B4B2A9">没用过任何AI产品，不知道ChatGPT是什么</text>
  </g>

  <g>
    <rect x="115" y="170" width="450" height="85" rx="8" ry="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
    <text x="340" y="206" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0F6E56">尝鲜用户</text>
    <text x="340" y="224" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1D9E75">~4亿 · 占约28%</text>
    <text x="340" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5DCAA5">下载过豆包/DeepSeek，问过几次，吃灰了</text>
  </g>

  <g>
    <rect x="160" y="265" width="360" height="75" rx="8" ry="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
    <text x="340" y="296" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#854F0B">免费活跃用户</text>
    <text x="340" y="314" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#BA7517">~3000-5000万 · 占约3%</text>
    <text x="340" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#EF9F27">日常免费版重度使用，但一毛没花</text>
  </g>

  <g>
    <rect x="210" y="350" width="260" height="75" rx="8" ry="8" fill="#FAEFEF" stroke="#F09595" stroke-width="0.8"/>
    <text x="340" y="380" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#A32D2D">基础付费用户</text>
    <text x="340" y="398" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#E24B4A">~800-1500万 · 占约1%</text>
    <text x="340" y="414" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F09595">至少付过1个AI平台的会员费</text>
  </g>

  <g>
    <rect x="260" y="435" width="160" height="55" rx="8" ry="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
    <text x="340" y="458" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#534AB7">付费重度用户</text>
    <text x="340" y="476" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7F77DD">~100-300万 · 占约0.1%</text>
  </g>

  <line x1="420" y1="462" x2="510" y2="462" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4,3"/>
  <circle cx="515" cy="462" r="4" fill="#534AB7"/>
  <text x="525" y="458" font-family="sans-serif" font-size="12" font-weight="500" fill="#534AB7">你可能在这</text>
  <text x="525" y="474" font-family="sans-serif" font-size="10" fill="#AFA9EC">多平台付费+API调用+本地算力</text>
  <text x="525" y="488" font-family="sans-serif" font-size="10" fill="#AFA9EC">但在这层的有几百万人</text>

  <text x="340" y="520" text-anchor="middle" font-family="sans-serif" font-size="12" fill="var(--color-text-secondary)">付费才是真需求。剩下70%的人连免费尝鲜都没做，市场远未饱和</text>
  <text x="340" y="538" text-anchor="middle" font-family="sans-serif" font-size="11" fill="var(--color-text-tertiary)">相比之前版本 · 紫色层从1万人变成了100-300万人，海风从"独一无二"变成"较早的几百万人之一"</text>
</svg>