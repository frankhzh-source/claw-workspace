<rect x="56" y="1270" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
<text class="ts" x="60" y="1289" fill="#444441">train_steps: 800-2000</text>

<rect x="345" y="1270" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
<text class="ts" x="349" y="1289" fill="#444441">rank: 32-64</text>

<rect x="56" y="1304" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
<text class="ts" x="60" y="1323" fill="#444441">optimizer: AdamW8bit</text>

<rect x="345" y="1304" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
