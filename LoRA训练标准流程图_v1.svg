<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1540" width="100%">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t{font-family:system-ui,-apple-system,sans-serif;font-size:14px;fill:#1f2937}
    .ts{font-family:system-ui,-apple-system,sans-serif;font-size:12px;fill:#6b7280}
    .th{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:500;fill:#1f2937}
  </style>
</defs>
<rect width="680" height="1540" fill="white"/>
<text class="th" x="340" y="30" text-anchor="middle">传统 LoRA 训练完整流程</text>
<text class="ts" x="340" y="48" text-anchor="middle">数据工程 环境 训练 测试 交付 — 五阶段标准工程指南</text>

<!-- Phase 1: Data Engineering -->
<rect x="40" y="70" width="600" height="230" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="340" y="96" text-anchor="middle" fill="#534AB7">Phase 1  数据工程（70% 工作量）</text>

<rect x="56" y="112" width="175" height="44" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="143" y="134" text-anchor="middle" fill="#3C3489">图片采集</text>
<text class="ts" x="143" y="148" text-anchor="middle" fill="#534AB7">30-200 张</text>

<rect x="247" y="112" width="175" height="44" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="334" y="134" text-anchor="middle" fill="#3C3489">图片筛选</text>
<text class="ts" x="334" y="148" text-anchor="middle" fill="#534AB7">去低清/多人/遮挡</text>

<rect x="438" y="112" width="175" height="44" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="525" y="134" text-anchor="middle" fill="#3C3489">预处理</text>
<text class="ts" x="525" y="148" text-anchor="middle" fill="#534AB7">裁剪/校色/打标</text>

<path d="M231 134 L247 134" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M422 134 L438 134" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="170" width="260" height="44" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="186" y="192" text-anchor="middle" fill="#3C3489">标注 Captioning</text>
<text class="ts" x="186" y="206" text-anchor="middle" fill="#534AB7">FLUX 纯自然语言 40-100 词</text>

<rect x="340" y="170" width="260" height="44" rx="8" fill="#AFA9EC" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="470" y="192" text-anchor="middle" fill="#3C3489">质量验收 QC</text>
<text class="ts" x="470" y="206" text-anchor="middle" fill="#534AB7">去重 / 污染检查 / 词频分析</text>

<path d="M316 192 L340 192" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="228" width="550" height="44" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="331" y="250" text-anchor="middle" fill="#3C3489">数据集拆分: train/ (80-90%)  ↔  val/ (10-20%)</text>

<path d="M340 300 L340 320" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 2: Environment -->
<rect x="40" y="330" width="600" height="160" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="340" y="356" text-anchor="middle" fill="#0F6E56">Phase 2  环境配置</text>

<rect x="56" y="372" width="175" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="143" y="394" text-anchor="middle" fill="#085041">硬件检查</text>
<text class="ts" x="143" y="408" text-anchor="middle" fill="#0F6E56">GPU >= 16GB</text>

<rect x="247" y="372" width="175" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="334" y="394" text-anchor="middle" fill="#085041">框架选择</text>
<text class="ts" x="334" y="408" text-anchor="middle" fill="#0F6E56">Kohya / AI-ToolKit / Codex</text>

<rect x="438" y="372" width="175" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="525" y="394" text-anchor="middle" fill="#085041">参数初始化</text>
<text class="ts" x="525" y="408" text-anchor="middle" fill="#0F6E56">LR 1e-4 / rank 32-64</text>

<path d="M231 394 L247 394" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M422 394 L438 394" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="430" width="550" height="44" rx="8" fill="#5DCAA5" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="331" y="452" text-anchor="middle" fill="#085041">Precheck（不可或缺）</text>
<text class="ts" x="331" y="466" text-anchor="middle" fill="#0F6E56">路径 → caption加载 → 模型加载 → 1-step → 5-step loss</text>

<path d="M340 490 L340 510" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 3: Training -->
<rect x="40" y="520" width="600" height="160" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="340" y="546" text-anchor="middle" fill="#854F0B">Phase 3  训练执行</text>

<rect x="56" y="562" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="146" y="584" text-anchor="middle" fill="#633806">多段训练</text>
<text class="ts" x="146" y="600" text-anchor="middle" fill="#854F0B">适应 → 主训 → 调优</text>

<rect x="252" y="562" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="342" y="584" text-anchor="middle" fill="#633806">Loss 监控</text>
<text class="ts" x="342" y="600" text-anchor="middle" fill="#854F0B">1.0 → 0.3 → 0.15</text>

<rect x="448" y="562" width="180" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="538" y="584" text-anchor="middle" fill="#633806">中间保存</text>
<text class="ts" x="538" y="600" text-anchor="middle" fill="#854F0B">每 100-200 steps</text>

<path d="M236 590 L252 590" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M432 590 L448 590" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="632" width="550" height="36" rx="8" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
<text class="ts" x="331" y="654" text-anchor="middle" fill="white">震荡=LR太高 / 不降=数据问题 / 飙升=OOM</text>

<path d="M340 680 L340 700" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 4: Testing -->
<rect x="40" y="710" width="600" height="160" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="340" y="736" text-anchor="middle" fill="#185FA5">Phase 4  测试验证（最容易被跳过）</text>

<rect x="56" y="752" width="280" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="196" y="774" text-anchor="middle" fill="#0C447C">推理测试</text>
<text class="ts" x="196" y="790" text-anchor="middle" fill="#185FA5">每个 CP 统一 prompt 生成 8 张</text>

<rect x="352" y="752" width="260" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="482" y="774" text-anchor="middle" fill="#0C447C">五维评分筛选</text>
<text class="ts" x="482" y="790" text-anchor="middle" fill="#185FA5">一致性/细节/背景/跟随/材质</text>

<path d="M336 780 L352 780" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect x="56" y="822" width="550" height="36" rx="8" fill="#85B7EB" stroke="#378ADD" stroke-width="0.5"/>
<text class="ts" x="331" y="844" text-anchor="middle" fill="#0C447C">每个检查点 8 张图 → 五维打分 → 选总分最高的权重</text>

<path d="M340 870 L340 890" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Phase 5: Delivery -->
<rect x="40" y="900" width="600" height="120" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="340" y="926" text-anchor="middle" fill="#3B6D11">Phase 5  交付与迭代</text>

<rect x="56" y="942" width="175" height="56" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="143" y="964" text-anchor="middle" fill="#27500A">权重归档</text>
<text class="ts" x="143" y="980" text-anchor="middle" fill="#3B6D11">最佳 .safetensors</text>

<rect x="247" y="942" width="175" height="56" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="334" y="964" text-anchor="middle" fill="#27500A">参数可复现</text>
<text class="ts" x="334" y="980" text-anchor="middle" fill="#3B6D11">config.yaml</text>

<rect x="438" y="942" width="175" height="56" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="th" x="525" y="964" text-anchor="middle" fill="#27500A">训练日志</text>
<text class="ts" x="525" y="980" text-anchor="middle" fill="#3B6D11">loss + 踩坑记录</text>

<path d="M231 970 L247 970" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<path d="M422 970 L438 970" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Core principle -->
<rect x="40" y="1060" width="600" height="80" rx="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text class="th" x="340" y="1086" text-anchor="middle" fill="#A32D2D">核心原则：局部完成 ≠ 整体完成</text>
<text class="ts" x="340" y="1108" text-anchor="middle" fill="#A32D2D">定标准 → 逐级验收 → 通过 → 下一步  跳过任一阶段 = 返工</text>

<!-- Params Quick Reference -->
<rect x="40" y="1160" width="600" height="200" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="1186" text-anchor="middle" fill="#444441">训练参数速查（FLUX LoRA）</text>

<rect x="56" y="1202" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
<text class="ts" x="60" y="1221" fill="#444441">resolution: 1024x1024</text>

<rect x="345" y="1202" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
<text class="ts" x="349" y="1221" fill="#444441">batch_size: 2-4</text>

<rect x="56" y="1236" width="275" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.3"/>
