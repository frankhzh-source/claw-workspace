<rect x="440" y="754" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="771" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">全量训（推荐范围内）</text>

<rect x="30" y="804" width="620" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="819" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" dominant-baseline="central">修正后执行流程</text>

<rect x="40" y="844" width="112" height="52" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="96" y="862" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C" dominant-baseline="central">装 diffusers</text>
<text x="96" y="878" text-anchor="middle" font-size="11" fill="#185FA5" dominant-baseline="central">训练依赖</text>

