<rect x="440" y="640" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="657" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">1e-4</text>

<rect x="30" y="678" width="200" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
