<rect x="235" y="526" width="200" height="34" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.3"/>
<text x="335" y="543" text-anchor="middle" font-size="12" fill="#791F1F" dominant-baseline="central">AI-Toolkit</text>
<rect x="440" y="526" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="543" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">diffusers（首选）</text>

