<rect x="235" y="678" width="200" height="34" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.3"/>
<text x="335" y="695" text-anchor="middle" font-size="12" fill="#791F1F" dominant-baseline="central">bf16</text>
<rect x="440" y="678" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="695" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">FP8（官方推荐）</text>

<rect x="30" y="716" width="200" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
