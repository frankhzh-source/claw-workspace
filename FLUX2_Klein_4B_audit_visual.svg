<rect x="440" y="716" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="733" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">800-1500</text>

<rect x="30" y="754" width="200" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
<text x="130" y="771" text-anchor="middle" font-size="12" fill="#444441" dominant-baseline="central">120张图处理</text>
<rect x="235" y="754" width="200" height="34" rx="4" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.3"/>
