<rect x="235" y="564" width="200" height="34" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.3"/>
<text x="335" y="581" text-anchor="middle" font-size="12" fill="#791F1F" dominant-baseline="central">-klein-4B（蒸馏版）</text>
<rect x="440" y="564" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="581" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">-klein-base-4B</text>

<rect x="30" y="602" width="200" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
<text x="130" y="619" text-anchor="middle" font-size="12" fill="#444441" dominant-baseline="central">Rank</text>
<rect x="235" y="602" width="200" height="34" rx="4" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.3"/>
<text x="335" y="619" text-anchor="middle" font-size="12" fill="#633806" dominant-baseline="central">32（或16）模糊</text>
<rect x="440" y="602" width="210" height="34" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
<text x="545" y="619" text-anchor="middle" font-size="12" fill="#27500A" dominant-baseline="central">16（官方默认）</text>

<rect x="30" y="640" width="200" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
<text x="130" y="657" text-anchor="middle" font-size="12" fill="#444441" dominant-baseline="central">学习率</text>
<rect x="235" y="640" width="200" height="34" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.3"/>
