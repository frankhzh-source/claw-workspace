<svg viewBox="0 0 680 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>直播运营数据飞轮系统架构图</title>
  <desc>六层数据闭环在直播运营领域的应用：感知层捕获直播间数据，反馈层分析正负反馈，记忆层沉淀经验，SOP与标准层驱动优化，数据库层持久化存储，正反馈循环提升每场直播效率</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">直播运营数据飞轮系统架构</text>
  <text x="340" y="50" text-anchor="middle" font-size="12" fill="#5F5E5A">每场直播一次闭环，数据驱动运营效率持续增长</text>
  <line x1="40" y1="60" x2="640" y2="60" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- 感知层 -->
  <rect x="40" y="74" width="600" height="64" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="60" y="96" font-size="14" font-weight="500" fill="#185FA5">感知层</text>
  <text x="60" y="118" font-size="12" fill="#0C447C">数据源：千川/抖店API / 直播间实时看板 / 评论区文本 / 竞品监控 / 商品点击转化</text>
  <text x="60" y="132" font-size="11" fill="#5F5E5A">采集字段：在线人数 停留时长 GMV 转化率 加购率 客单价 话术语速 评论关键词</text>
  <!-- 向下箭头 -->
  <line x1="340" y1="138" x2="340" y2="150" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 反馈层 -->
  <rect x="40" y="152" width="600" height="64" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="60" y="174" font-size="14" font-weight="500" fill="#3C3489">反馈层</text>
  <text x="60" y="196" font-size="12" fill="#26215C">正反馈：高转化时段 / 高停留话术 / 爆款商品特征 / 高效过款节奏</text>
  <text x="60" y="210" font-size="11" fill="#5F5E5A">负反馈：掉人时刻 / 低转化商品 / 评论区负面 / 主播状态波动 / 憋单失败</text>
  <!-- 向下箭头 -->
  <line x1="340" y1="216" x2="340" y2="228" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 记忆层 -->
  <rect x="40" y="230" width="600" height="64" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="60" y="252" font-size="14" font-weight="500" fill="#085041">记忆层（Elite）</text>
  <text x="60" y="274" font-size="12" fill="#04342C">L1寄存器 → L2向量库 → L3冷存储 → L4文件 → L5压缩 → L6知识图谱</text>
  <text x="60" y="288" font-size="11" fill="#5F5E5A">记忆内容：每场直播数据快照 / 主播能力画像 / 品类转化基线 / 竞品策略库</text>
  <!-- 双向箭头到 SOP + 标准 -->
  <line x1="340" y1="294" x2="340" y2="306" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- SOP层 + 标准层 并行 -->
  <rect x="40" y="310" width="290" height="64" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="185" y="332" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">SOP 层</text>
  <text x="185" y="352" text-anchor="middle" font-size="12" fill="#412402">怎么做 — 标准化流程</text>
  <text x="185" y="368" text-anchor="middle" font-size="11" fill="#5F5E5A">开场话术 / 过款节奏 / 憋单流程 / 福利排布</text>
  <rect x="350" y="310" width="290" height="64" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="332" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">标准层</text>
  <text x="495" y="352" text-anchor="middle" font-size="12" fill="#412402">做成什么样算好 — 验收体系</text>
  <text x="495" y="368" text-anchor="middle" font-size="11" fill="#5F5E5A">停留&gt;90s / 转化率&gt;3% / 加购率&gt;8%</text>
  <!-- SOP ↔ 标准 双向箭头 -->
  <line x1="340" y1="330" x2="340" y2="345" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="340" y1="345" x2="340" y2="330" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- 向下箭头 -->
  <line x1="340" y1="374" x2="340" y2="386" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 数据库层 -->
  <rect x="40" y="390" width="600" height="48" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="60" y="412" font-size="14" font-weight="500" fill="#2C2C2A">数据库层</text>
  <text x="160" y="412" font-size="12" fill="#444441">SQLite（运营数据）</text>
  <text x="340" y="412" font-size="12" fill="#444441">LanceDB（向量检索）</text>
  <text x="510" y="412" font-size="12" fill="#444441">文件系统（直播录屏/截图）</text>
  <!-- 回环箭头 -->
  <path d="M640 414 Q660 414 660 340 Q660 266 640 266" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M640 260 Q640 254 634 254 L628 254" fill="none" stroke="#BA7517" stroke-width="1.5"/>
  <text x="662" y="340" font-size="11" fill="#BA7517" transform="rotate(90,662,340)">人工校准干预</text>
  <!-- 正反馈循环 -->
  <path d="M340 438 Q340 450 340 458" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="120" y="462" width="440" height="44" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="484" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">正反馈循环：每场直播经验沉淀 → SOP优化 → 标准提升 → 下一场效率更高</text>
  <!-- 右下角说明 -->
  <line x1="40" y1="530" x2="640" y2="530" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="550" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">直播运营核心应用场景</text>
  <!-- 三个场景卡片 -->
  <rect x="40" y="562" width="185" height="40" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="132" y="586" text-anchor="middle" font-size="12" fill="#0C447C">场景一：单场直播复盘</text>
  <rect x="247" y="562" width="185" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="586" text-anchor="middle" font-size="12" fill="#26215C">场景二：主播能力提升</text>
  <rect x="455" y="562" width="185" height="40" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="547" y="586" text-anchor="middle" font-size="12" fill="#04342C">场景三：品类选品决策</text>
</svg>