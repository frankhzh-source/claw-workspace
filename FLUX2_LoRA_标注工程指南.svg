  <text class="ts" x="195" y="692" text-anchor="middle" font-size="12" fill="#666">阈值 &gt;40% 严重 → 替换同义词</text>

  <rect x="350" y="652" width="270" height="56" rx="8" fill="#fff" stroke="#BA7517" stroke-width="0.5"/>
