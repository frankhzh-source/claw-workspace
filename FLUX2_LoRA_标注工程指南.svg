      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 500; }
      .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-weight: 400; }
      .box { fill: #fff; }
      .node { cursor: pointer; }
      .node:hover rect { opacity: 0.85; }
      .c-blue rect { fill: #E6F1FB; stroke: #378ADD; }
      .c-teal rect { fill: #E1F5EE; stroke: #1D9E75; }
      .c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
      .c-pink rect { fill: #FBEAF0; stroke: #D4537E; }
