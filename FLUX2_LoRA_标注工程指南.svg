  <text class="ts" x="340" y="56" text-anchor="middle" font-size="13" fill="#666">五阶段渐进式学习路径 · 服装 LoRA · 触发词 ohwx person</text>

  <!-- ============ 阶段1：入门 ============ -->
  <rect x="40" y="76" width="600" height="160" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="60" y="100" font-size="14" fill="#3C3489">阶段1：入门 · 理解原理</text>
  
  <rect x="60" y="114" width="270" height="56" rx="8" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="195" y="134" text-anchor="middle" font-size="13" fill="#3C3489">第一章：为什么 FLUX.2</text>
  <text class="th" x="195" y="154" text-anchor="middle" font-size="13" fill="#3C3489">需要自然语言标注</text>

  <rect x="350" y="114" width="270" height="56" rx="8" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="485" y="134" text-anchor="middle" font-size="13" fill="#3C3489">第二章：触发词植入的</text>
  <text class="th" x="485" y="154" text-anchor="middle" font-size="13" fill="#3C3489">语义学原理</text>

  <line x1="330" y1="142" x2="348" y2="142" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4"/>

  <rect x="60" y="182" width="560" height="42" rx="6" fill="#fff" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="3"/>
  <text class="ts" x="80" y="200" font-size="12" fill="#3C3489">核心认知：Mistral-3 编码器 → 自然语言理解 → 标签列表=触发词完全无效</text>
  <text class="ts" x="80" y="216" font-size="11" fill="#666">自动标注工具(WD14 Tagger)=负资产，手动标注是唯一正确选择</text>

