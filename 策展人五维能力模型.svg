<svg viewBox="0 0 680 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>策展人五维能力模型</title>
  <desc>域深度、遴选标准、叙事能力、工具编排、信任资本五个维度的能力模型可视化</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A1A">策展人五维能力模型</text>
  <text x="340" y="56" text-anchor="middle" font-size="12" fill="#5F5E5A">AI时代最稀缺的能力 — 不是"做"东西，是"选"和"排"东西</text>
  <line x1="40" y1="72" x2="640" y2="72" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="340" cy="220" r="32" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="340" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">策展人</text>
  <text x="340" y="232" text-anchor="middle" font-size="11" fill="#085041">核心能力</text>
  <line x1="340" y1="188" x2="340" y2="130" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="240" y="86" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">域深度</text>
  <text x="340" y="122" text-anchor="middle" font-size="11" fill="#534AB7">在一个领域比AI判断更准</text>
  <rect x="40" y="290" width="280" height="120" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="58" y="314" font-size="12" font-weight="bold" fill="#3C3489">域深度</text>
  <text x="58" y="334" font-size="11" fill="#2C2C2A">在某个领域拥有足够深的认知积累</text>
  <text x="58" y="354" font-size="11" fill="#5F5E5A">能区分"优秀"和"及格"</text>
  <text x="58" y="374" font-size="11" fill="#5F5E5A">经验来自实践，不是来自训练数据</text>
  <text x="58" y="394" font-size="11" fill="#5F5E5A">不需要懂所有领域</text>
  <line x1="372" y1="220" x2="430" y2="220" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="430" y="198" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="530" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">遴选标准</text>
  <text x="530" y="234" text-anchor="middle" font-size="11" fill="#1D9E75">可复用的判断框架</text>
  <rect x="360" y="290" width="280" height="120" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="378" y="314" font-size="12" font-weight="bold" fill="#085041">遴选标准</text>
  <text x="378" y="334" font-size="11" fill="#2C2C2A">行业基准 + 个人审美 + 受众意识</text>
  <text x="378" y="354" font-size="11" fill="#5F5E5A">从海量AI输出中挑出最优选</text>
  <text x="378" y="374" font-size="11" fill="#5F5E5A">不是随机的个人偏好</text>
  <text x="378" y="394" font-size="11" fill="#5F5E5A">是稳定的价值判断体系</text>
  <line x1="340" y1="252" x2="340" y2="310" stroke="#BA7517" stroke-width="1.5"/>
  <rect x="240" y="310" width="200" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#854F0B">叙事能力</text>
  <text x="340" y="346" text-anchor="middle" font-size="11" fill="#BA7517">把素材串成有逻辑的表达</text>
  <line x1="40" y1="420" x2="640" y2="420" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="340" y="436" text-anchor="middle" font-size="11" fill="#888780">还有两个维度：工具编排（用AI高效执行策展）+ 信任资本（让人愿意跟你走）</text>
</svg>