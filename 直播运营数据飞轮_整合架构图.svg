<svg viewBox="0 0 680 650" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>直播运营数据飞轮整合架构图（含已有资产映射）</title>
  <desc>整合六卖神剑话术体系、抖音官方CORE方法论、五维四率转化力分析、主播培训46点体系和90天训练路径的直播运营数据飞轮六层架构</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">直播运营数据飞轮 — 整合架构图 v2</text>
  <text x="340" y="50" text-anchor="middle" font-size="12" fill="#5F5E5A">六卖神剑 + CORE标准 + 五维四率 + 90天培训路径 整合闭环</text>
  <line x1="40" y1="60" x2="640" y2="60" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- 感知层 -->
  <rect x="40" y="74" width="600" height="66" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="60" y="96" font-size="14" font-weight="500" fill="#185FA5">感知层</text>
  <text x="60" y="116" font-size="12" fill="#0C447C">千川/抖店API 实时看板 评论区 竞品监控 商品后台</text>
  <text x="60" y="132" font-size="11" fill="#5F5E5A">采集字段：GMV 在线人数 停留时长 互动率 评论关键词 五维四率原始数据</text>
  <!-- 箭头 -->
  <line x1="340" y1="140" x2="340" y2="152" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 反馈层 -->
  <rect x="40" y="154" width="600" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="60" y="176" font-size="14" font-weight="500" fill="#3C3489">反馈层 — 五维四率 + 六卖神剑诊断</text>
  <text x="60" y="196" font-size="12" fill="#26215C">进房率→点击率→停留率→互动率→转化率（五维漏斗评分）</text>
  <text x="60" y="212" font-size="11" fill="#5F5E5A">六卖神剑完整度：品牌信任 款式匹配 渠道优势 紧迫感 互动 转粉</text>
  <line x1="340" y1="220" x2="340" y2="232" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 记忆层 -->
  <rect x="40" y="234" width="600" height="66" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="60" y="256" font-size="14" font-weight="500" fill="#085041">记忆层（Elite）</text>
  <text x="60" y="276" font-size="12" fill="#04342C">每场数据快照 / 五维四率评分 / 六卖神剑评分 / 主播画像 / 品类基线</text>
  <text x="60" y="292" font-size="11" fill="#5F5E5A">L1寄存器 → L2向量库 → L3冷存储 | 90天活跃→归档 | 主播画像永久保留</text>
  <line x1="340" y1="300" x2="340" y2="312" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- SOP层 + 标准层 并行 -->
  <rect x="40" y="314" width="290" height="72" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="185" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">SOP 层 — 六卖神剑话术框架</text>
  <text x="185" y="354" text-anchor="middle" font-size="12" fill="#412402">品牌信任 款式匹配 渠道优势</text>
  <text x="185" y="372" text-anchor="middle" font-size="11" fill="#5F5E5A">紧迫感 互动 转粉 五感融合</text>
  <rect x="350" y="314" width="290" height="72" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">标准层 — CORE方法论</text>
  <text x="495" y="354" text-anchor="middle" font-size="12" fill="#412402">5级评分制 品类行业基准</text>
  <text x="495" y="372" text-anchor="middle" font-size="11" fill="#5F5E5A">流量结构标准 数据异常诊断</text>
  <!-- 双向连接 -->
  <line x1="340" y1="338" x2="340" y2="358" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="340" y1="358" x2="340" y2="338" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="340" y1="386" x2="340" y2="398" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 数据库层 -->
  <rect x="40" y="400" width="600" height="44" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="60" y="424" font-size="14" font-weight="500" fill="#2C2C2A">数据库层</text>
  <text x="150" y="424" font-size="12" fill="#444441">SQLite（场次/GMV/基线）</text>
  <text x="340" y="424" font-size="12" fill="#444441">LanceDB（向量检索）</text>
  <text x="530" y="424" font-size="12" fill="#444441">文件系统（话术/课件）</text>
  <line x1="340" y1="444" x2="340" y2="456" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 正反馈循环 -->
  <rect x="40" y="458" width="600" height="52" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="340" y="480" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">正反馈循环（三条回路）</text>
  <text x="340" y="498" text-anchor="middle" font-size="11" fill="#04342C">回路1：单场数据 → 六卖神剑SOP迭代</text>
  <text x="340" y="508" text-anchor="middle" font-size="11" fill="#04342C">回路2：多场选品 → 品类基准更新</text>
  <!-- 回环 -->
  <path d="M640 484 Q670 484 670 340 Q670 180 640 180" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M640 174 Q640 168 634 168 L628 168" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="676" y="340" font-size="11" fill="#1D9E75" transform="rotate(90,676,340)">人工校准（每场+每周+每月）</text>
  <!-- 分隔线 -->
  <line x1="40" y1="525" x2="640" y2="525" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="545" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">整合已有资产的飞轮闭环</text>
  <!-- 3个资产卡片 -->
  <rect x="40" y="558" width="190" height="78" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="135" y="580" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">六卖神剑话术体系</text>
  <text x="135" y="600" text-anchor="middle" font-size="12" fill="#412402">six-swords.md</text>
  <text x="135" y="618" text-anchor="middle" font-size="11" fill="#5F5E5A">五感融合 + 黄金圈</text>
  <rect x="245" y="558" width="190" height="78" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="340" y="580" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">CORE官方数据标准</text>
  <text x="340" y="600" text-anchor="middle" font-size="12" fill="#173404">douyin-validator</text>
  <text x="340" y="618" text-anchor="middle" font-size="11" fill="#5F5E5A">5级评分 + 行业基准</text>
  <rect x="450" y="558" width="190" height="78" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="545" y="580" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">主播90天培训路径</text>
  <text x="545" y="600" text-anchor="middle" font-size="12" fill="#26215C">anchor-trainer 46点</text>
  <text x="545" y="618" text-anchor="middle" font-size="11" fill="#5F5E5A">靶向训练 + 能力评估</text>
</svg>