<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO品牌可见度测试 · 实时查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#f0f2f5;color:#1d2129;line-height:1.5}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:28px 40px}
.header h1{font-size:22px;font-weight:600;margin-bottom:6px}
.header .sub{font-size:12px;opacity:.7}
.container{max-width:1200px;margin:0 auto;padding:20px}

.config-card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.config-card h2{font-size:16px;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.field label .req{color:#ff4d4f;margin-left:2px}
.field input{width:100%;border:1px solid #d9d9d9;border-radius:6px;padding:9px 12px;font-size:13px}
.field input:focus{outline:none;border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.12)}
.engine-bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0}
.eng-chip{padding:7px 14px;border:2px solid #d9d9d9;border-radius:18px;cursor:pointer;font-size:12px;background:#fff;user-select:none;transition:all .2s}
.eng-chip.active{border-color:#1890ff;background:#e6f7ff;color:#1890ff;font-weight:600}
.eng-chip.disabled{opacity:.4;cursor:not-allowed}
.eng-chip .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.eng-chip .dot.on{background:#52c41a}
.eng-chip .dot.off{background:#d9d9d9}

.btn{padding:11px 24px;border-radius:7px;font-size:14px;cursor:pointer;font-weight:500;border:none;transition:all .2s}
.btn-primary{background:#1890ff;color:#fff}
.btn-primary:hover{background:#40a9ff}
.btn-primary:disabled{background:#bae7ff;cursor:not-allowed}
.btn-outline{background:#fff;border:1px solid #d9d9d9;color:#333;margin-left:8px}
.btn-outline:hover{background:#f5f5f5}
.btn-row{display:flex;gap:8px;align-items:center;margin-top:16px}
.status{font-size:12px;color:#999;margin-left:8px}

.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1890ff,#52c41a);transition:width .4s;width:0}

/* 单个AI平台结果卡 */
.platform-card{background:#fff;border-radius:12px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.platform-head{padding:16px 20px;background:linear-gradient(to right,#f8f9fa,#fff);border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.platform-name{font-size:15px;font-weight:600}
.platform-meta{font-size:11px;color:#999;margin-top:2px}
.platform-actions{display:flex;gap:8px;align-items:center}
.score-pill{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.score-pill.zero{background:#fff1f0;color:#ff4d4f}
.score-pill.low{background:#fff7e6;color:#fa8c16}
.score-pill.mid{background:#e6f7ff;color:#1890ff}
.score-pill.high{background:#f6ffed;color:#52c41a}
.platform-body{padding:8px 0}
.qa-item{padding:14px 20px;border-bottom:1px solid #f5f5f5}
.qa-item:last-child{border-bottom:none}
.qa-q{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.qa-tag{flex-shrink:0;padding:2px 8px;background:#e6f7ff;color:#1890ff;border-radius:4px;font-size:11px;font-weight:600;line-height:1.6}
.qa-tag.r3{background:#fff7e6;color:#fa8c16}
.qa-q-text{font-size:13px;color:#333;font-weight:500;flex:1}
.qa-a{background:#fafafa;border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.7;color:#1d2129;margin-left:30px;position:relative}
.qa-a.mentioned{background:#f6ffed;border-left:3px solid #52c41a}
.qa-a.unmentioned{background:#fafafa;color:#999;border-left:3px solid #d9d9d9}
.qa-a.partial{background:#fff7e6;border-left:3px solid #faad14}
.qa-a.loading{color:#999;font-style:italic}
.qa-a .mention-mark{background:#fff566;padding:0 2px;border-radius:2px;font-weight:600}

.report-bar{background:linear-gradient(135deg,#52c41a,#389e0d);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;display:none;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(82,196,26,.2)}
.report-bar.show{display:flex}
.report-bar .info h3{font-size:16px;margin-bottom:4px}
.report-bar .info p{font-size:12px;opacity:.9}
.btn-white{background:#fff;color:#389e0d;border:none;padding:10px 20px;border-radius:7px;font-weight:600;cursor:pointer}
.btn-white:hover{background:#f6ffed}

@media(max-width:768px){
  .form-row{grid-template-columns:1fr}
  .header{padding:20px 16px}
  .container{padding:12px}
  .report-bar{flex-direction:column;gap:12px;align-items:flex-start}
}
</style>
</head>
<body>

<div class="header">
  <h1>🔍 GEO品牌可见度测试 · 实时查询</h1>
  <div class="sub">5个AI平台 × 5个测试维度 × 3轮实测 — 直接看到AI的原始回答，再决定要不要生成报告</div>
</div>

<div class="container">

  <div class="config-card">
    <h2>⚙️ 测试配置</h2>
    <div class="form-row">
      <div class="field"><label>品牌/人物名称<span class="req">*</span></label>
        <input id="brand" placeholder="如：海风老师"></div>
      <div class="field"><label>所属品类/领域<span class="req">*</span></label>
        <input id="category" placeholder="如：电商GEO优化"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>独有方法论名称（可选）</label>
        <input id="method" placeholder="如：三层信源验证法"></div>
      <div class="field"><label>竞品名称（可选）</label>
        <input id="competitor" placeholder="如：增长超人"></div>
    </div>
    <div class="field" style="margin-bottom:8px">
      <label>选择测试平台 <span style="font-weight:400;color:#999;font-size:11px">— 绿色圆点=API已配置，灰色=未配置</span></label>
      <div class="engine-bar" id="engineBar"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnRun" onclick="runAll()">▶ 开始实时测试</button>
      <button class="btn btn-outline" onclick="location.reload()">↻ 重置</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="report-bar" id="reportBar">
    <div class="info">
      <h3>📊 测试完成 — 是否生成完整报告？</h3>
      <p>所有AI原始回答已展示在上方。点击右侧按钮生成可视化报告（含评分矩阵+异常诊断+修复建议）</p>
    </div>
    <button class="btn-white" onclick="generateReport()">生成完整报告</button>
  </div>

  <div id="results"></div>

</div>

<script>
const ENGINES = {
  deepseek:{name:'DeepSeek',mau:'4.84亿'},
  qwen:{name:'千问',mau:'2.51亿'},
  kimi:{name:'Kimi',mau:'2269万'},
  doubao:{name:'豆包',mau:'3.24亿'},
  hunyuan:{name:'元宝',mau:'1.04亿'},
};
let allResults = {};  // {engine: {dim: {round: {prompt, answer, error}}}}
let currentConfig = null;

const DIMS = ['品牌认知','品类提及','方法论识别','竞品对比','长尾场景'];

// 加载平台列表（含API状态）
async function loadEngines(){
  try {
    const r = await fetch('/engines');
    const data = await r.json();
    const bar = document.getElementById('engineBar');
    bar.innerHTML = '';
    for(const e of data.engines){
      const chip = document.createElement('div');
      chip.className = 'eng-chip' + (e.has_key?' active':' disabled');
      chip.dataset.engine = e.id;
      chip.innerHTML = `<span class="dot ${e.has_key?'on':'off'}"></span>${e.name}<span style="color:#aaa;font-size:10px;margin-left:4px">${e.mau}</span>${!e.has_key?'<span style="color:#bbb;font-size:10px;margin-left:4px">需API</span>':''}`;
      if(e.has_key) chip.onclick = ()=>chip.classList.toggle('active');
      bar.appendChild(chip);
    }
  } catch(e) {
    document.getElementById('status').innerHTML = '⚠️ 服务未启动：请先运行 <code>python geo_api_server.py</code>';
  }
}

async function runAll(){
  const brand = document.getElementById('brand').value.trim();
  const category = document.getElementById('category').value.trim();
  const method = document.getElementById('method').value.trim() || '该方法论';
  const competitor = document.getElementById('competitor').value.trim() || '竞品A';
  if(!brand || !category){alert('请填写品牌和品类');return;}

  const engines = [...document.querySelectorAll('.eng-chip.active')].map(e=>e.dataset.engine);
  if(!engines.length){alert('请选择至少一个平台');return;}

  currentConfig = {brand,category,method,competitor,engines};
  allResults = {};

  document.getElementById('results').innerHTML = '';
  document.getElementById('reportBar').classList.remove('show');
  document.getElementById('btnRun').disabled = true;
  document.getElementById('status').textContent = '正在加载测试问题...';

  // 获取prompts
  const r = await fetch('/api/prompts',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({brand,category,methodology:method,competitor})});
  const {prompts} = await r.json();

  // 为每个平台创建卡片
  for(const eid of engines){
    createPlatformCard(eid);
  }

  // 逐个调用
  const total = engines.length * DIMS.length * 3;
  let done = 0;
  for(const eid of engines){
    allResults[eid] = {};
    for(const dim of DIMS){
      allResults[eid][dim] = {};
      for(const rnd of ['R1','R2','R3']){
        const prompt = prompts[dim][rnd];
        updateStatus(`${ENGINES[eid].name} | ${dim} | ${rnd}`);
        const resp = await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({engine:eid,prompt})});
        const data = await resp.json();
        allResults[eid][dim][rnd] = {prompt, ...data};
        appendAnswer(eid, dim, rnd, data);
        done++;
        document.getElementById('progress').style.width = (done/total*100)+'%';
      }
    }
  }

  // 标记所有平台得分
  for(const eid of engines){
    scorePlatform(eid);
  }

  document.getElementById('btnRun').disabled = false;
  document.getElementById('status').textContent = '✅ 测试完成';
  document.getElementById('reportBar').classList.add('show');
  document.getElementById('reportBar').scrollIntoView({behavior:'smooth'});
}

function createPlatformCard(eid){
  const eng = ENGINES[eid];
  const card = document.createElement('div');
  card.className = 'platform-card';
  card.id = `card-${eid}`;
  card.innerHTML = `
    <div class="platform-head">
      <div>
        <div class="platform-name">${eng.name} <span id="score-${eid}" class="score-pill zero">--</span></div>
        <div class="platform-meta">${eng.mau} · 测试中</div>
      </div>
      <div class="platform-actions" id="actions-${eid}"></div>
    </div>
    <div class="platform-body" id="body-${eid}"></div>`;
  document.getElementById('results').appendChild(card);
}

function appendAnswer(eid, dim, rnd, data){
  const body = document.getElementById(`body-${eid}`);
  const item = document.createElement('div');
  item.className = 'qa-item';
  item.id = `qa-${eid}-${dim}-${rnd}`;

  const isR3 = rnd === 'R3';
  const content = data.status === 'ok' ? data.content : `❌ ${data.error}`;
  const mentioned = data.status === 'ok' && currentConfig.brand && content.toLowerCase().includes(currentConfig.brand.toLowerCase());
  let cls = 'qa-a';
  if(data.status === 'ok'){
    if(mentioned) cls += ' mentioned';
    else cls += ' unmentioned';
  } else {
    cls += ' unmentioned';
  }
  const displayContent = mentioned
    ? content.replace(new RegExp(currentConfig.brand,'gi'), m=>`<span class="mention-mark">${m}</span>`)
    : content;

  item.innerHTML = `
    <div class="qa-q">
      <span class="qa-tag ${isR3?'r3':''}">${rnd}</span>
      <span class="qa-q-text">${dim} · ${data.prompt||''}</span>
    </div>
    <div class="${cls}">${data.status==='ok'?displayContent:`<em>${content}</em>`}</div>`;
  body.appendChild(item);
}

function scorePlatform(eid){
  let total = 0, max = 0;
  for(const dim of DIMS){
    for(const rnd of ['R1','R2','R3']){
      const r = allResults[eid]?.[dim]?.[rnd];
      if(!r) continue;
      max += 3;
      if(r.status==='ok' && r.content && currentConfig.brand &&
         r.content.toLowerCase().includes(currentConfig.brand.toLowerCase())){
        total += 2; // 简化：直接提及=2分
      } else if(r.status==='ok'){
        total += 1; // 语义可见=1分
      }
    }
  }
  const pct = max ? Math.round(total/max*100) : 0;
  const pill = document.getElementById(`score-${eid}`);
  pill.textContent = `${pct}%`;
  pill.className = 'score-pill ' + (pct<5?'zero':pct<20?'low':pct<50?'mid':'high');
  const meta = document.querySelector(`#card-${eid} .platform-meta`);
  if(meta) meta.textContent = `${ENGINES[eid].mau} · ${total}/${max} 分`;
}

function updateStatus(text){
  document.getElementById('status').textContent = text;
}

function generateReport(){
  // 调用Python脚本生成报告
  const status = document.getElementById('status');
  status.textContent = '正在生成报告...';
  fetch('/api/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    results:allResults, config:currentConfig
  })}).then(r=>r.json()).then(d=>{
    status.textContent = d.message;
    if(d.ok){
      // 把报告嵌入下方
      const div = document.createElement('div');
      div.innerHTML = d.html;
      document.getElementById('results').appendChild(div);
    }
  }).catch(e=>{status.textContent = '生成失败：'+e.message;});
}

loadEngines();
</script>
</body>
</html>
