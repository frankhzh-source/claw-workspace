<svg viewBox="0 0 680 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>数据飞轮商品化：从客户诊断到行业资产</title>
  <desc>展示直播运营数据飞轮商品化的三层架构：数据采集、资产沉淀（含合规红线）、产品化输出</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">数据飞轮商品化架构</text>
  <text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">从客户诊断到行业资产的三层路径 + 合规边界</text>
  <line x1="40" y1="56" x2="640" y2="56" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 1: Source -->
  <text x="40" y="80" font-size="13" font-weight="500" fill="#3C3489">数据源 — 客户服务</text>
  
  <!-- Client A box -->
  <rect x="40" y="92" width="190" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="135" y="116" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">客户A · 30场直播</text>
  <line x1="230" y1="112" x2="270" y2="112" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- Your Analysis -->
  <rect x="270" y="88" width="130" height="48" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="335" y="106" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">你的诊断产出</text>
  <text x="335" y="124" text-anchor="middle" font-size="11" fill="#5F5E5A">六卖神剑评分+异常定位</text>
  <line x1="400" y1="112" x2="440" y2="112" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- Elite Memory -->
  <rect x="440" y="88" width="100" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="490" y="106" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">Elite 记忆</text>
  <text x="490" y="124" text-anchor="middle" font-size="11" fill="#04342C">L2向量库存储</text>
  
  <!-- Client B -->
  <rect x="40" y="148" width="190" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="135" y="172" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">客户B · 50场直播</text>
  <line x1="230" y1="168" x2="270" y2="168" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  
  <rect x="270" y="144" width="130" height="48" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="335" y="162" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A">你的诊断产出</text>
  <text x="335" y="180" text-anchor="middle" font-size="11" fill="#5F5E5A">六卖神剑评分+异常定位</text>
  <line x1="400" y1="168" x2="440" y2="168" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  
  <rect x="440" y="144" width="100" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="490" y="162" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">Elite 记忆</text>
  <text x="490" y="180" text-anchor="middle" font-size="11" fill="#04342C">L2向量库存储</text>
  
  <!-- Vertical line connecting both clients to asset pool -->
  <line x1="490" y1="136" x2="490" y2="192" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="490" y1="192" x2="490" y2="210" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  
  <line x1="40" y1="200" x2="640" y2="200" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 2: Asset Pool with Compliance -->
  <text x="40" y="226" font-size="13" font-weight="500" fill="#2C2C2A">资产沉淀 — 能复用什么，不能复用什么</text>
  
  <!-- Green side - reusable -->
  <rect x="40" y="240" width="290" height="96" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="185" y="260" text-anchor="middle" font-size="12" font-weight="500" fill="#3B6D11">可跨客户复用  ✅</text>
  <line x1="60" y1="268" x2="310" y2="268" stroke="#97C459" stroke-width="0.5"/>
  <text x="185" y="284" text-anchor="middle" font-size="11" fill="#27500A">品类转化基准（女装GPM 3000+）</text>
  <text x="185" y="298" text-anchor="middle" font-size="11" fill="#27500A">话术模板（六卖神剑品类适配版）</text>
  <text x="185" y="312" text-anchor="middle" font-size="11" fill="#27500A">异常诊断模式（掉人时段归因逻辑）</text>
  <text x="185" y="326" text-anchor="middle" font-size="11" fill="#27500A">CORE基线（各指标行业参考值）</text>
  
  <!-- Red side - private -->
  <rect x="350" y="240" width="290" height="96" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="495" y="260" text-anchor="middle" font-size="12" font-weight="500" fill="#A32D2D">不可跨客户复用  ❌</text>
  <line x1="370" y1="268" x2="620" y2="268" stroke="#F09595" stroke-width="0.5"/>
  <text x="495" y="284" text-anchor="middle" font-size="11" fill="#791F1F">客户A的原始GMV/在线/转化数据</text>
  <text x="495" y="298" text-anchor="middle" font-size="11" fill="#791F1F">客户A的主播个人话术</text>
  <text x="495" y="312" text-anchor="middle" font-size="11" fill="#791F1F">客户A的商品链接/粉丝画像</text>
  <text x="495" y="326" text-anchor="middle" font-size="11" fill="#791F1F">客户A的独家价格策略</text>
  
  <!-- Arrow from asset pool to products -->
  <line x1="340" y1="336" x2="340" y2="358" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  
  <line x1="40" y1="348" x2="640" y2="348" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 3: Products -->
  <text x="40" y="376" font-size="13" font-weight="500" fill="#633806">产品化输出 — 三层定价</text>
  
  <!-- L1 -->
  <rect x="40" y="390" width="190" height="68" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="135" y="410" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">L1 诊断报告</text>
  <text x="135" y="428" text-anchor="middle" font-size="11" fill="#412402">单场六卖神剑评分</text>
  <text x="135" y="444" text-anchor="middle" font-size="11" fill="#412402">异常定位+整改建议</text>
  <text x="135" y="452" text-anchor="middle" font-size="10" fill="#5F5E5A">定价：500-2000/场</text>
  
  <!-- L2 -->
  <rect x="245" y="390" width="190" height="68" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="410" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">L2 行业基准</text>
  <text x="340" y="428" text-anchor="middle" font-size="11" fill="#412402">品类转化基准+话术模板库</text>
  <text x="340" y="444" text-anchor="middle" font-size="11" fill="#412402">CORE基线+诊断模式库</text>
  <text x="340" y="452" text-anchor="middle" font-size="10" fill="#5F5E5A">定价：年费 2-5万</text>
  
  <!-- L3 -->
  <rect x="450" y="390" width="190" height="68" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="545" y="410" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">L3 飞轮搭建</text>
  <text x="545" y="428" text-anchor="middle" font-size="11" fill="#412402">把你的数据跑成飞轮</text>
  <text x="545" y="444" text-anchor="middle" font-size="11" fill="#412402">Elite+LOOP+六卖神剑</text>
  <text x="545" y="452" text-anchor="middle" font-size="10" fill="#5F5E5A">定价：项目 10-30万</text>
  
  <line x1="40" y1="472" x2="640" y2="472" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Section 4: Compliance rules -->
  <text x="40" y="498" font-size="13" font-weight="500" fill="#A32D2D">合规红线 — 合同三条款</text>
  
  <rect x="40" y="512" width="600" height="90" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  
  <circle cx="65" cy="532" r="4" fill="#E24B4A"/>
  <text x="78" y="536" font-size="12" fill="#791F1F">数据所有权：客户原始数据归客户，服务结束后X日内删除</text>
  
  <circle cx="65" cy="554" r="4" fill="#E24B4A"/>
  <text x="78" y="558" font-size="12" fill="#791F1F">分析方法复用权：诊断模型、评分逻辑、话术框架归你所有</text>
  
  <circle cx="65" cy="576" r="4" fill="#E24B4A"/>
  <text x="78" y="580" font-size="12" fill="#791F1F">匿名化基准权：匿名聚合后生成行业参考基准</text>
  
  <line x1="40" y1="612" x2="640" y2="612" stroke="#D3D1C7" stroke-width="0.5"/>
</svg>