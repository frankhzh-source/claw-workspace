<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1300" width="100%" role="img">
  <title>城市选择结构性红利完整框架</title>
  <desc>FDE定义、三大结构性红利、杭州行动策略（五类活动+五类群体+两个生态位）、通用四步法、收益公式、行业匹配表、关键提醒</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- === TOP: Title + FDE === -->
  <text x="340" y="36" text-anchor="middle" font-size="18" font-weight="500" fill="#1A1A1A">城市选择的三个结构性红利</text>
  <text x="340" y="56" text-anchor="middle" font-size="12" fill="#5F5E5A">海风 · AI电商 FDE（Forward Deployed Engineer）</text>

  <rect x="40" y="72" width="600" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="56" y="90" font-size="12" font-weight="500" fill="#3C3489">FDE = 兼具技术开发 + 产品思考 + 客户业务落地能力</text>
  <text x="56" y="108" font-size="11" fill="#3C3489">把AI模型/Demo转化为落地的业务工作流，解决AI落地最后一公里</text>

  <line x1="80" y1="134" x2="600" y2="134" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- === SECTION: 三大红利 === -->
  <text x="340" y="164" text-anchor="middle" font-size="15" font-weight="500" fill="#1A1A1A">三大结构性红利</text>

  <!-- 红利1 -->
  <rect x="40" y="180" width="600" height="92" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <rect x="40" y="180" width="6" height="92" rx="3" fill="#1D9E75"/>
  <text x="62" y="202" font-size="14" font-weight="500" fill="#085041">红利1：信息梯度差</text>
  <text x="62" y="222" font-size="12" fill="#0F6E56">离行业前沿越近，获取信息的时间成本和难度越低</text>
  <text x="62" y="240" font-size="11" fill="#0F6E56">杭州有阿里/字节/快手总部 → 新政策/工具1周内知道 vs 其他城市1-3个月</text>
  <text x="62" y="258" font-size="11" fill="#0F6E56">2026年618，杭州AIGC服务商已内测AI全域投放接口，同行还在问"AI视频怎么做"</text>

  <line x1="340" y1="272" x2="340" y2="286" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 红利2 -->
  <rect x="40" y="294" width="600" height="92" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <rect x="40" y="294" width="6" height="92" rx="3" fill="#378ADD"/>
  <text x="62" y="316" font-size="14" font-weight="500" fill="#0C447C">红利2：人才溢出效应</text>
  <text x="62" y="336" font-size="12" fill="#185FA5">大公司不只消耗人才，也在持续释放人才</text>
  <text x="62" y="354" font-size="11" fill="#185FA5">阿里系每年大量中高层出来创业，带方法论+行业认知+人脉</text>
  <text x="62" y="372" font-size="11" fill="#185FA5">你和这群人做合作伙伴的概率比其他城市高10倍</text>

  <line x1="340" y1="386" x2="340" y2="400" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 红利3 -->
  <rect x="40" y="408" width="600" height="92" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <rect x="40" y="408" width="6" height="92" rx="3" fill="#BA7517"/>
  <text x="62" y="430" font-size="14" font-weight="500" fill="#633806">红利3：生态密度效应</text>
  <text x="62" y="450" font-size="12" fill="#854F0B">上下游在不在一个城市，决定事情能不能做成</text>
  <text x="62" y="468" font-size="11" fill="#854F0B">做AI电商视频：平台对接步行距离｜模型接口人沙龙加上｜后期外包一抓一大把</text>
  <text x="62" y="486" font-size="11" fill="#854F0B">每个环节省3天，一个项目省出1个月</text>

  <line x1="80" y1="518" x2="600" y2="518" stroke="#D3D1C7" stroke-width="0.5"/>

