  <rect x="444" y="476" width="170" height="54" rx="8" fill="white" stroke="#F4C0D1" stroke-width="0.5"/>
  <text class="ts" x="529" y="495" text-anchor="middle" font-size="12" fill="#993556" dominant-baseline="central">决策</text>
