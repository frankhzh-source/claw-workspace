    .sub { font-size: 12px; fill: #94a3b8; }
    .h2 { font-size: 12px; font-weight: 600; }
    .bd11 { font-size: 11px; fill: #374151; }
    .bd10 { font-size: 10px; fill: #6b7280; }
    .tag-txt { font-size: 10px; font-weight: 600; fill: #fff; }
    .stbl-v { font-size: 10px; font-weight: 600; }
    .stbl-d { font-size: 10px; fill: #6b7280; }
  </style>
  <rect x="0" y="0" width="800" height="1130" fill="#fff"/>
  <text x="48" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">5</text>
  <text x="80" y="43" font-size="11" font-weight="600" fill="#374151">正式训练</text>
  <text x="80" y="59" font-size="10" fill="#6b7280">precheck 通过 → 单方向 smoke test (300 steps) → 四方向正式训练</text>
  <rect x="30" y="74" width="740" height="28" rx="6" fill="#374151"/>
  <text x="46" y="93" font-size="12" font-weight="600" fill="#fff">复盘结论</text>
  <rect x="30" y="112" width="740" height="75" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="0.5"/>
  <rect x="30" y="112" width="4" height="70" rx="2" fill="#a855f7"/>
  <text x="46" y="132" font-size="11" font-weight="600" fill="#6b21a8">核心教训</text>
  <text x="46" y="152" font-size="11" fill="#6b21a8">LoRA 训练不能把"局部完成"当成"整体完成"。必须按训练资料工程闭环推进：</text>
  <text x="46" y="170" font-size="11" fill="#6b21a8">图片合格 → caption 合格 → 配置指向正确 → 脚本路径干净 → 模型格式可加载 → precheck 通过</text>
  <rect x="30" y="192" width="740" height="28" rx="6" fill="#374151"/>
  <text x="46" y="211" font-size="12" font-weight="600" fill="#fff">改进措施汇总</text>
  <rect x="30" y="230" width="740" height="40" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5"/>
  <rect x="30" y="230" width="740" height="20" rx="6" fill="#22c55e"/>
  <rect x="30" y="244" width="740" height="6" fill="#22c55e"/>
  <text x="46" y="245" class="tag-txt">已修复（6 项）</text>
  <text x="46" y="264" font-size="10" fill="#065f46">#1 Caption 重写 · #3 分类修正 · #4 图源分离 · #5 Config 更新 · #7 脚本修复 · #8 质检修正</text>
  <rect x="30" y="276" width="740" height="40" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
  <rect x="30" y="276" width="740" height="20" rx="6" fill="#eab308"/>
  <rect x="30" y="290" width="740" height="6" fill="#eab308"/>
  <text x="46" y="291" class="tag-txt">流程改进（3 项）</text>
  <text x="46" y="310" font-size="10" fill="#92400e">#2 分层判断 · #6 503 5 步 SOP · #10 总控进度表 STATUS 标签</text>
  <rect x="30" y="322" width="740" height="40" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
  <rect x="30" y="322" width="740" height="20" rx="6" fill="#ef4444"/>
  <rect x="30" y="336" width="740" height="6" fill="#ef4444"/>
  <text x="46" y="337" class="tag-txt">待解决（1 项）</text>
  <text x="46" y="356" font-size="10" fill="#991b1b">#9 模型格式：需 native flux-2-klein-base-4b.safetensors</text>
  <rect x="30" y="370" width="740" height="28" rx="6" fill="#374151"/>
  <text x="46" y="389" font-size="12" font-weight="600" fill="#fff">各错误修正说明（10 条）</text>
  <text x="34" y="405" font-size="10" fill="#374151">#1  Caption 范式：短标签/模板句 → 40-100 词自然语言描述（FLUX.2 Mistral-3 编码器要求）</text>
  <text x="34" y="424" font-size="10" fill="#374151">#2  分层判断：图片合格 → caption 合格 → 训练包完整 → 模型可加载 → precheck 通过，逐层确认</text>
  <text x="34" y="443" font-size="10" fill="#374151">#3  分类标准：国风/甜美/纯欲等视觉直觉 → frog buttons/contrast piping/satin/velvet 等服装结构</text>
  <text x="34" y="462" font-size="10" fill="#374151">#4  图源分离：真人穿着→train_ready；礼盒/平铺/挂拍/细节→control_refs/review，互不混入</text>
  <text x="34" y="481" font-size="10" fill="#374151">#5  Config 同步：新包指向 dvc_lora_v5_strict_caption_rework_v1，避免旧标注污染</text>
  <text x="34" y="500" font-size="10" fill="#374151">#6  503 预案：5 步 SOP：完成内容 / 卡点 / 可执行命令 / 预期输出 / 下一步复核</text>
  <text x="34" y="519" font-size="10" fill="#374151">#7  迁移脚本：修复幂等性校验，D 盘保留正式 outputs+backup，C 盘释放空间</text>
  <text x="34" y="538" font-size="10" fill="#374151">#8  质检脚本：修正下划线触发词误判，已通过 120/120</text>
  <text x="34" y="557" font-size="10" fill="#374151">#9  模型格式：区分数据工程和模型权重，先完成数据再处理格式，用 precheck 验证</text>
  <text x="34" y="576" font-size="10" fill="#374151">#10 进度表：总控清单推进，每阶段输出 STATUS 标签（完成/阻塞/等待）</text>
  <line x1="30" y1="600" x2="770" y2="2510" stroke="#d1d5db" stroke-width="0.5"/>
  <line x1="30" y1="602" x2="770" y2="2512" stroke="#e5e7eb" stroke-width="0.3"/>
  <text x="34" y="632" font-size="12" font-weight="600" fill="#374151">作者信息</text>
  <text x="34" y="654" font-size="11" fill="#6b7280">海风老师 | AI技术咨询 / LoRA模型训练 / 电商AI落地</text>
  <text x="34" y="672" font-size="11" fill="#6b7280">微信：frankhzheng</text>
  <text x="400" y="1110" text-anchor="middle" font-size="10" fill="#9ca3af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">FLUX.2 LoRA 训练错误复盘 - 3/3</text>
</svg>