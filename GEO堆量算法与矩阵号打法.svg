<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="100%" height="100%" style="background: #FAFBFC; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#185FA5"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D32F2F"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2E7D32"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="900" height="60" fill="#185FA5"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">GEO 堆量算法逻辑与矩阵号打法 · 全景拆解</text>

  <!-- ===== SECTION 1: 4-Step Algorithm Pipeline ===== -->
  <text x="40" y="95" font-size="16" font-weight="700" fill="#185FA5">一、GEO 推荐四步算法链路（堆量效果递减）</text>

  <!-- Step 1: Embedding -->
  <rect x="40" y="110" width="390" height="100" rx="10" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="110" width="390" height="28" rx="10" fill="#1976D2"/>
  <rect x="40" y="128" width="390" height="10" fill="#1976D2"/>
  <text x="235" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">第1步 · 语义嵌入 Embedding</text>
  <text x="55" y="158" font-size="12" fill="#333">用户提问→向量化→余弦相似度搜索</text>
  <text x="55" y="178" font-size="12" fill="#555">只看语义距离，不看来源权威性</text>
  <rect x="55" y="190" width="120" height="16" rx="8" fill="#2E7D32"/>
  <text x="115" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">堆量有效 ✓</text>

  <!-- Arrow 1→2 -->
  <line x1="235" y1="210" x2="235" y2="233" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 2: Recall -->
  <rect x="40" y="238" width="390" height="100" rx="10" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="238" width="390" height="28" rx="10" fill="#1976D2"/>
  <rect x="40" y="256" width="390" height="10" fill="#1976D2"/>
  <text x="235" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">第2步 · 粗召回 Top-N</text>
  <text x="55" y="286" font-size="12" fill="#333">返回几百个候选内容块</text>
  <text x="55" y="306" font-size="12" fill="#555">同样只看语义匹配</text>
  <rect x="55" y="318" width="120" height="16" rx="8" fill="#2E7D32"/>
  <text x="115" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">堆量有效 ✓</text>

  <!-- Arrow 2→3 -->
  <line x1="235" y1="338" x2="235" y2="361" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 3: Re-rank -->
  <rect x="40" y="366" width="390" height="100" rx="10" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="366" width="390" height="28" rx="10" fill="#F57C00"/>
  <rect x="40" y="384" width="390" height="10" fill="#F57C00"/>
  <text x="235" y="386" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">第3步 · 精排 Cross-encoder</text>
  <text x="55" y="414" font-size="12" fill="#333">对候选逐对打分 → 排序出 Top-10</text>
  <text x="55" y="434" font-size="12" fill="#555">评估：信息密度 · 语言质量 · 结构化程度</text>
  <rect x="55" y="446" width="140" height="16" rx="8" fill="#E65100"/>
  <text x="125" y="458" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">堆量开始打折 ✗</text>

  <!-- Arrow 3→4 -->
  <line x1="235" y1="466" x2="235" y2="489" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 4: LLM -->
  <rect x="40" y="494" width="390" height="100" rx="10" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="494" width="390" height="28" rx="10" fill="#D32F2F"/>
  <rect x="40" y="512" width="390" height="10" fill="#D32F2F"/>
  <text x="235" y="514" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">第4步 · LLM 生成 + 引用选择</text>
  <text x="55" y="542" font-size="12" fill="#333">Top-10 喂进大模型 → 选择引用哪些</text>
  <text x="55" y="562" font-size="12" fill="#555">偏好差异化来源，不重复引用同一号</text>
  <rect x="55" y="574" width="150" height="16" rx="8" fill="#B71C1C"/>
  <text x="130" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">堆量效果最弱 ✗</text>

  <!-- ===== RIGHT SIDE: Matrix Account Strategy ===== -->
  <text x="470" y="95" font-size="16" font-weight="700" fill="#185FA5">二、解法：矩阵号 + 信息密度</text>

  <!-- Matrix Account box -->
  <rect x="470" y="110" width="390" height="255" rx="10" fill="#F1F8E9" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="470" y="110" width="390" height="28" rx="10" fill="#2E7D32"/>
  <rect x="470" y="128" width="390" height="10" fill="#2E7D32"/>
  <text x="665" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">矩阵号来源差异化</text>

  <text x="485" y="158" font-size="12" font-weight="600" fill="#333">同一来源（无效）</text>
  <text x="485" y="178" font-size="11" fill="#888">同质化内容 · 同一结构 · 集中发布</text>
  <line x1="485" y1="188" x2="845" y2="188" stroke="#C8E6C9" stroke-width="1"/>

  <text x="485" y="208" font-size="12" font-weight="600" fill="#2E7D32">不同来源（有效）</text>
  <text x="485" y="228" font-size="11" fill="#555">不同视角：价格篇/案例篇/避坑篇</text>
  <text x="485" y="248" font-size="11" fill="#555">分散发布，形成持续活跃信号</text>
  <text x="485" y="268" font-size="11" fill="#555">各有独立数据点、表格、结论</text>

  <rect x="485" y="285" width="160" height="28" rx="14" fill="#2E7D32"/>
  <text x="565" y="304" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">10×角度 = 10 来源</text>

  <!-- Info Density box -->
  <rect x="470" y="378" width="390" height="215" rx="10" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="470" y="378" width="390" height="28" rx="10" fill="#3949AB"/>
  <rect x="470" y="396" width="390" height="10" fill="#3949AB"/>
  <text x="665" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">信息密度提升（AI 辅助）</text>

  <text x="485" y="426" font-size="12" font-weight="600" fill="#2E7D32">适合 AI 做 ✓</text>
  <text x="485" y="446" font-size="11" fill="#555">· 长文拆成 10 个问答</text>
  <text x="485" y="464" font-size="11" fill="#555">· 零散经验整理成结构化表格</text>
  <text x="485" y="482" font-size="11" fill="#555">· 口语化改成数据化表达</text>

  <text x="485" y="508" font-size="12" font-weight="600" fill="#D32F2F">不适合 AI 做 ✗</text>
  <text x="485" y="528" font-size="11" fill="#888">· 编造数据和案例</text>
  <text x="485" y="546" font-size="11" fill="#888">· 生成伪经验、批量空洞内容</text>
  <text x="485" y="564" font-size="11" fill="#888">（LLM 引用了你的内容后，如果发现是编造的，信任资产就废了）</text>

  <!-- ===== External Verification Box ===== -->
  <rect x="470" y="605" width="390" height="100" rx="10" fill="#FFF8E1" stroke="#FFE082" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="470" y="605" width="390" height="28" rx="10" fill="#FF8F00"/>
  <rect x="470" y="623" width="390" height="10" fill="#FF8F00"/>
  <text x="665" y="625" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">外部互证（他证 &gt; 自证）</text>
  <text x="485" y="655" font-size="11" fill="#555">· 引用真实数据、报告、客户反馈</text>
  <text x="485" y="673" font-size="11" fill="#555">· 让行业媒体/KOL 引用你的内容</text>
  <text x="485" y="691" font-size="11" fill="#555">· 内容库类项目（awesome 列表）本身就是互证结构</text>

  <!-- ===== BOTTOM: SEO Timeline Comparison ===== -->
  <text x="40" y="625" font-size="16" font-weight="700" fill="#185FA5">三、窗口期：SEO 历史教训 vs GEO 现在</text>

  <rect x="40" y="640" width="390" height="65" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <text x="235" y="662" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">2026 稀疏期 → 堆量回报率极高</text>
  <text x="235" y="682" text-anchor="middle" font-size="12" fill="#555">中文互联网高质量内容稀缺，现在堆量 = 占领语义空间</text>
  <text x="235" y="698" text-anchor="middle" font-size="11" fill="#888">预计窗口剩余 6-12 个月</text>

  <rect x="40" y="715" width="390" height="65" rx="8" fill="#FFF8E1" stroke="#FFE082" stroke-width="1"/>
  <text x="235" y="737" text-anchor="middle" font-size="14" font-weight="700" fill="#F57C00">2027 密集期 → 精排开始杀</text>
  <text x="235" y="757" text-anchor="middle" font-size="12" fill="#555">AI 平台引入来源质量分 / 引用频率上限</text>
  <text x="235" y="773" text-anchor="middle" font-size="11" fill="#888">类似于 2011 年 Google Panda 对内容农场的清洗</text>

  <rect x="40" y="790" width="390" height="65" rx="8" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="1"/>
  <text x="235" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#D32F2F">之后：纯堆量窗口关闭</text>
  <text x="235" y="832" text-anchor="middle" font-size="12" fill="#555">只有信息密度高的内容能活下来</text>
  <text x="235" y="848" text-anchor="middle" font-size="11" fill="#888">内容农场历史重演</text>

  <!-- ===== TIME STRATEGY BOX ===== -->
  <rect x="470" y="720" width="390" height="135" rx="10" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="470" y="720" width="390" height="28" rx="10" fill="#7B1FA2"/>
  <rect x="470" y="738" width="390" height="10" fill="#7B1FA2"/>
  <text x="665" y="740" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">时间策略</text>

  <rect x="485" y="758" width="170" height="40" rx="6" fill="#FFCDD2"/>
  <text x="570" y="775" text-anchor="middle" font-size="11" font-weight="600" fill="#C62828">错误</text>
  <text x="570" y="792" text-anchor="middle" font-size="11" fill="#555">一次性发 100 篇停更</text>

  <rect x="670" y="758" width="175" height="40" rx="6" fill="#C8E6C9"/>
  <text x="757" y="775" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">正确</text>
  <text x="757" y="792" text-anchor="middle" font-size="11" fill="#555">10 号 × 每周 1-2 篇持续</text>

  <text x="490" y="822" font-size="11" fill="#555">一次性爆发 → 被识别为批量操作，降质量分</text>
  <text x="490" y="842" font-size="11" fill="#555">持续稳定更新 → 被视为活跃来源，覆盖不同训练窗口</text>

  <!-- ===== FINAL FORMULA ===== -->
  <rect x="40" y="870" width="820" height="60" rx="10" fill="#185FA5" filter="url(#shadow)"/>
  <text x="450" y="898" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">最终公式：矩阵号 × 信息密度 × 真实经验 × 持续更新 × 外部互证</text>
  <text x="450" y="920" text-anchor="middle" font-size="13" fill="#B5D4F4">五个同时做，精排去重和LLM引用偏好问题就被对冲了</text>

  <!-- ===== FOOTER ===== -->
  <rect x="40" y="950" width="820" height="50" rx="8" fill="#F5F5F5"/>
  <text x="60" y="972" font-size="12" font-weight="600" fill="#333">最优策略不是堆量 vs 不堆量——是在窗口期内堆量铺覆盖率，</text>
  <text x="60" y="992" font-size="12" fill="#666">同时在每篇内容里埋信息密度，让精排过滤器来了也杀不掉你。</text>

  <!-- Author Info -->
  <rect x="40" y="1020" width="820" height="60" rx="8" fill="#E3F2FD"/>
  <text x="60" y="1040" font-size="12" font-weight="700" fill="#185FA5">关于作者</text>
  <text x="60" y="1058" font-size="11" fill="#555">海风老师 | AI技术咨询 / LoRA模型训练 / AI电商落地</text>
  <text x="60" y="1074" font-size="11" fill="#555">微信：frankhzheng | 内容资产库：github.com/frankhzh-source/hf-ai-articles</text>

</svg>